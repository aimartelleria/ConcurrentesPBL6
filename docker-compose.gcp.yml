# =====================================================================
# Stack de producción para GCP (Opción A: VM única de Compute Engine).
# Usa imágenes ya construidas y subidas a Artifact Registry.
# Las variables se leen del archivo .env (ver .env.example).
#
#   docker compose -f docker-compose.gcp.yml up -d
# =====================================================================
version: '3.8'

services:
  kafka:
    image: bitnami/kafka:3.7.0
    container_name: kafka-cluster
    restart: unless-stopped
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CFG_LISTENERS=INTERNAL://:9092,EXTERNAL://:9094,CONTROLLER://:9093
      # EXTERNAL_HOST = IP/DNS pública de la VM. Sin esto, los AgenteGo externos
      # reciben "localhost:9094" tras el bootstrap y no pueden publicar.
      - KAFKA_CFG_ADVERTISED_LISTENERS=INTERNAL://kafka:9092,EXTERNAL://${EXTERNAL_HOST}:9094
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=INTERNAL
    healthcheck:
      test: ["CMD-SHELL", "/opt/bitnami/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  node-1:
    image: ${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPO}/rmi-server:latest
    container_name: rmi-node-1
    hostname: node-1
    restart: unless-stopped
    environment:
      - NODE_ID=node-1
      - HOST=node-1
      - PORT=6100
      - SEEDS=node-1:6100 node-2:6101 node-3:6102
      - JVM_OPTS=-Djava.rmi.server.hostname=node-1
    depends_on:
      - kafka

  node-2:
    image: ${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPO}/rmi-server:latest
    container_name: rmi-node-2
    hostname: node-2
    restart: unless-stopped
    environment:
      - NODE_ID=node-2
      - HOST=node-2
      - PORT=6101
      - SEEDS=node-1:6100 node-2:6101 node-3:6102
      - JVM_OPTS=-Djava.rmi.server.hostname=node-2
    depends_on:
      - kafka

  node-3:
    image: ${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPO}/rmi-server:latest
    container_name: rmi-node-3
    hostname: node-3
    restart: unless-stopped
    environment:
      - NODE_ID=node-3
      - HOST=node-3
      - PORT=6102
      - SEEDS=node-1:6100 node-2:6101 node-3:6102
      - JVM_OPTS=-Djava.rmi.server.hostname=node-3
    depends_on:
      - kafka

  client:
    image: ${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPO}/rmi-client:latest
    container_name: rmi-client
    restart: unless-stopped
    environment:
      # Consumo interno de Kafka por el listener INTERNAL (misma red bridge).
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SEEDS=node-1:6100 node-2:6101 node-3:6102
    depends_on:
      kafka:
        condition: service_healthy
      node-1:
        condition: service_started
      node-2:
        condition: service_started
      node-3:
        condition: service_started
