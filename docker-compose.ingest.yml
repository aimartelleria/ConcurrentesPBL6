# =====================================================================
# Capa de INGESTA: NiFi (gateway con verificación de licencia) + MySQL.
#
# Este fichero NO se arranca solo: se FUSIONA con un compose "core" que
# define el servicio `kafka` (docker-compose.yml en local o
# docker-compose.gcp.yml en la nube). Al usar -f comparten red y proyecto,
# por eso NiFi puede resolver `kafka` y `mysql` por nombre.
#
#   # Local (core + ingesta):
#   docker compose -f docker-compose.yml -f docker-compose.ingest.yml up -d
#
#   # GCP (core de producción + ingesta):
#   docker compose -f docker-compose.gcp.yml -f docker-compose.ingest.yml up -d
#
# Usa solo imágenes públicas, así que sirve igual para local y para la nube.
# =====================================================================
version: '3.8'

services:
  # ─── MySQL (WebHardMon): empresas, admins y licencias ──────────────────────
  # init.sql crea el esquema y un seed de prueba al arrancar por primera vez.
  mysql:
    image: mysql:8.0
    container_name: webhardmon-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=telemetriadb
    ports:
      - "3306:3306"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── NiFi: gateway de ingesta + verificación de licencia contra MySQL ──────
  # UI en https://localhost:8443 ; los agentes Go publican en http://nifi:8081/telemetry
  # (mapeado a localhost:8081). Coloca el driver MySQL Connector/J en ./nifi/drivers/.
  nifi:
    image: apache/nifi:1.27.0
    container_name: nifi-gateway
    ports:
      - "8443:8443"   # consola web (HTTPS)
      - "8081:8081"   # endpoint HandleHttpRequest para los agentes
    environment:
      - SINGLE_USER_CREDENTIALS_USERNAME=admin
      - SINGLE_USER_CREDENTIALS_PASSWORD=hardmonNiFiAdmin2026   # mínimo 12 caracteres
      - NIFI_WEB_HTTPS_PORT=8443
    volumes:
      - ./nifi/drivers:/opt/nifi/drivers:ro     # driver JDBC de MySQL
      - nifi-conf:/opt/nifi/nifi-current/conf   # persiste el flujo entre reinicios
    depends_on:
      mysql:
        condition: service_healthy
      kafka:                  # definido en el compose "core" fusionado con -f
        condition: service_healthy

volumes:
  mysql-data:
  nifi-conf:
