# ============================================================================
# Configuración de SonarCloud — monorepo Java (Maven) + agente Go.
# La usa el SonarScanner CLI (SonarSource/sonarqube-scan-action) del workflow
# .github/workflows/sonar.yml. NO se usa el scanner de Maven, por eso la
# organización va aquí y NO en el pom.xml.
# ============================================================================

sonar.projectKey=hardmon_agentego
sonar.organization=hardmon

# Nombre y versión mostrados en la UI de SonarCloud
sonar.projectName=AgenteGo Telemetry Cluster
sonar.projectVersion=1.0

# --- Código fuente a analizar ---
# Java de los 3 módulos Maven + el agente Go (un único proyecto multi-lenguaje).
sonar.sources=common/src/main/java,server/src/main/java,client/src/main/java,AgenteGo-main

# --- Java ---
# Bytecode compilado: IMPRESCINDIBLE para el análisis Java del scanner CLI.
# Lo produce el paso "mvn package" del workflow antes de escanear.
sonar.java.binaries=common/target/classes,server/target/classes,client/target/classes
sonar.java.source=21

# --- Codificación ---
sonar.sourceEncoding=UTF-8

# --- Exclusiones (binarios, doc generada y clases sueltas de prueba) ---
sonar.exclusions=**/target/**,build/**,**/*.class,index.html,TestSend.java,src/**

# --- (Opcional) Cobertura de Go ---
# Genera el perfil con:  cd AgenteGo-main && go test ./... -coverprofile=coverage.out
# y descomenta la línea siguiente (también añade el paso de tests Go al workflow):
#sonar.go.coverage.reportPaths=AgenteGo-main/coverage.out
