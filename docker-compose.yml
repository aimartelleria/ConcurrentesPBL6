version: '3.8'

services:
  kafka:
    image: bitnami/kafka:3.7.0
    container_name: kafka-cluster
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CFG_LISTENERS=INTERNAL://:9092,EXTERNAL://:9094,CONTROLLER://:9093
      # EXTERNAL_HOST debe ser la IP/DNS por la que los AgenteGo externos alcanzan a Kafka.
      # En local se queda en "localhost"; en GCP se exporta EXTERNAL_HOST=<IP_PUBLICA_VM>.
      - KAFKA_CFG_ADVERTISED_LISTENERS=INTERNAL://kafka:9092,EXTERNAL://${EXTERNAL_HOST:-localhost}:9094
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=INTERNAL
    healthcheck:
      test: ["CMD-SHELL", "/opt/bitnami/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  node-1:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: rmi-node-1
    hostname: node-1
    ports:
      - "6100:6100"
    environment:
      - NODE_ID=node-1
      - HOST=node-1
      - PORT=6100
      - SEEDS=node-1:6100 node-2:6101 node-3:6102
      - JVM_OPTS=-Djava.rmi.server.hostname=node-1
    depends_on:
      - kafka

  node-2:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: rmi-node-2
    hostname: node-2
    ports:
      - "6101:6101"
    environment:
      - NODE_ID=node-2
      - HOST=node-2
      - PORT=6101
      - SEEDS=node-1:6100 node-2:6101 node-3:6102
      - JVM_OPTS=-Djava.rmi.server.hostname=node-2
    depends_on:
      - kafka

  node-3:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: rmi-node-3
    hostname: node-3
    ports:
      - "6102:6102"
    environment:
      - NODE_ID=node-3
      - HOST=node-3
      - PORT=6102
      - SEEDS=node-1:6100 node-2:6101 node-3:6102
      - JVM_OPTS=-Djava.rmi.server.hostname=node-3
    depends_on:
      - kafka

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    container_name: rmi-client
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SCHEMA_REGISTRY_URL=http://schema-registry:8085
      - TELEMETRY_TOPIC=telemetry
      - CASSANDRA_CONTACT_POINTS=cassandra:9042
      - CASSANDRA_LOCAL_DC=datacenter1
      - CASSANDRA_KEYSPACE=webhardmon
      - SEEDS=node-1:6100 node-2:6101 node-3:6102
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_started
      cassandra:
        condition: service_healthy
      node-1:
        condition: service_started
      node-2:
        condition: service_started
      node-3:
        condition: service_started

  # ─── Confluent Schema Registry (gobierno del esquema Avro) ─────────────────
  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.0
    container_name: schema-registry
    ports:
      - "8085:8085"
    environment:
      - SCHEMA_REGISTRY_HOST_NAME=schema-registry
      - SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS=PLAINTEXT://kafka:9092
      - SCHEMA_REGISTRY_LISTENERS=http://0.0.0.0:8085
    depends_on:
      kafka:
        condition: service_healthy

  # ─── Cassandra (almacén de mediciones) ─────────────────────────────────────
  cassandra:
    image: cassandra:4.1
    container_name: webhardmon-cassandra
    ports:
      - "9042:9042"
    volumes:
      - cassandra-data:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'describe keyspaces' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 12

  # Crea el keyspace/tablas una vez Cassandra está sana, y termina.
  cassandra-init:
    image: cassandra:4.1
    container_name: webhardmon-cassandra-init
    restart: "no"
    depends_on:
      cassandra:
        condition: service_healthy
    volumes:
      - ./db/schema-cassandra.cql:/schema.cql:ro
    entrypoint: ["sh", "-c", "cqlsh cassandra -f /schema.cql && echo 'Cassandra: esquema cargado'"]

volumes:
  cassandra-data:

# La capa de ingesta (NiFi + MySQL) vive en docker-compose.ingest.yml.
# Arráncala fusionando los ficheros (comparten red y proyecto):
#   docker compose -f docker-compose.yml -f docker-compose.ingest.yml up -d
