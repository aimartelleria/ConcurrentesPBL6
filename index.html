# 🚀 Subir el servicio a Cloud — paso a paso

Despliegue del contenedor Java (`rmi-server` ×3 + `rmi-client`) en la infra del equipo
(3 nubes unidas por WireGuard). **Regla de oro:** la imagen se construye **una vez sin
direcciones**; las direcciones del WireGuard se inyectan **al desplegar** (pasos 4-5), nunca
se recompila para cambiar una dirección. Los **puertos no cambian**, solo los **hosts**.

## Prerrequisitos
- Infra provisionada (`webhardmon-infra`): VMs + WireGuard + Kafka + Schema Registry +
  Cassandra + NiFi + túnel Cloudflare.
- Acceso al registry de contenedores (Harbor local / Artifact Registry en GCP).

## 1. (Antes) Construir y publicar las imágenes
```bash
docker build -t <REGISTRY>/rmi-server:latest -f server/Dockerfile . && docker push <REGISTRY>/rmi-server:latest
docker build -t <REGISTRY>/rmi-client:latest -f client/Dockerfile . && docker push <REGISTRY>/rmi-client:latest
```
`<REGISTRY>` = Harbor (local) o `europe-southwest1-docker.pkg.dev/<PROJECT>/<REPO>` (GCP-A).

## 2. (Una vez) Crear el esquema en Cassandra
```bash
cqlsh <cassandra-wg> -f db/schema-cassandra.cql   # keyspace webhardmon (mediciones/ordenadores/empresas)
```

## 3. (Una vez) Registrar el esquema Avro
Registra `schemas/telemetry.avsc` en el Schema Registry para el subject `telemetry-value`
(o deja que NiFi lo registre al publicar el primer mensaje).

## 4. (Después) Desplegar los 3 nodos `rmi-server`
Cada nodo en su VM, con **su nombre de WireGuard**:
```bash
docker run -d --name rmi-node-1 \
  -e NODE_ID=node-01 -e HOST=node-01 -e PORT=6100 \
  -e SEEDS="node-01:6100 node-02:6100 node-03:6100" \
  -e JVM_OPTS="-Djava.rmi.server.hostname=node-01" \
  -p 6100:6100 <REGISTRY>/rmi-server:latest
# Repetir en node-02 y node-03 cambiando NODE_ID/HOST/hostname (PORT=6100 en cada VM).
```
> ⚠️ `java.rmi.server.hostname` DEBE ser el nombre WireGuard de esa VM, o los stubs RMI
> apuntarán a direcciones inalcanzables entre nodos.

## 5. (Después) Desplegar el `rmi-client`
Apuntando a Kafka / Schema Registry / Cassandra del compañero (WireGuard):
```bash
docker run -d --name rmi-client \
  -e KAFKA_BOOTSTRAP_SERVERS="<kafka-wg>:9092" \
  -e SCHEMA_REGISTRY_URL="http://<sr-wg>:8085" \
  -e CASSANDRA_CONTACT_POINTS="<cass-wg>:9042" \
  -e CASSANDRA_LOCAL_DC="<dc-real>" \
  -e CASSANDRA_KEYSPACE="webhardmon" \
  <REGISTRY>/rmi-client:latest \
  node-01:6100 node-02:6100 node-03:6100      # seeds RMI como argumentos
```
Plantilla completa de variables: **`.env.cloud.example`**.

## 6. Conectar los agentes Go
En cada PC de usuario (entran por el túnel Cloudflare, fuera del WireGuard):
```bash
./AgenteGo -mode=publisher -nifi-url="https://ingest.<zona>/telemetry" \
  -codigo="<licencia>" -portatil="<nombre-ordenador>"
```

## 7. Verificar
- Logs de `rmi-client`: `[OK] <equipo> stress=.. -> mediciones`.
- En Cassandra: `SELECT * FROM webhardmon.mediciones LIMIT 5;`
- Si el clúster RMI cae, los mensajes van a `telemetry.DLT` (no se pierden; at-least-once).

> Si el despliegue lo hace Ansible, estos `docker run` equivalen a las tareas del
> playbook: lo esencial es inyectar **las mismas variables de entorno**.

## ¿Qué cambia respecto a local?
| | Local | Cloud |
|---|---|---|
| Hosts (Kafka/SR/Cassandra/nodos) | `localhost` / nombres Docker | nombres **WireGuard** |
| `java.rmi.server.hostname` | `node-1` | nombre WireGuard de la VM |
| Agente → ingesta | `http://localhost:8081` | túnel Cloudflare `https://ingest.<zona>` |
| Puertos y nombres lógicos (topic, keyspace) | — | **no cambian** |

# Java RMI Cluster (no single point of failure)

> [!TIP]
> **🚀 ¡DOCUMENTACIÓN CENTRALIZADA DISPONIBLE!**
> Hemos unificado todas las guías, diagramas de arquitectura, referencias rápidas y resultados en un panel web interactivo premium. Abre el archivo **[index.html](index.html)** en tu navegador para ver la documentación interactiva con buscador, modo oscuro/claro y copia rápida de comandos.

A peer-to-peer RMI cluster. Every node runs its own RMI registry, members
discover and track each other via gossip, and clients bootstrap from a
list of seeds (any one alive is enough). Killing any subset short of
"all of them" leaves the rest functional.

## Files

```

  Endpoint.java         Serializable (host, port, nodeId); equality by host:port
  Task.java             Generic computing task interface for compute engine
  ComputeService.java   Remote interface: getNodeId, ping, executeTask, processTelemetry, gossip
  ClusterNode.java      Self-registering, gossip-driven peer (Virtual Threads)
  Client.java           Multi-seed bootstrap + round-robin + failover + Kafka consumer
```

## Design

**End-to-end telemetry pipeline.** A Go collector agent on each user machine
measures CPU/RAM/disk/temperature and sends it via HTTP POST to an **Apache
NiFi** ingestion gateway with license headers (`X-License-Code`, `X-Portatil`)
— it no longer publishes to Kafka directly. NiFi validates the agent's license
against MySQL (must be active), enriches with `empresa_id`/`nombre`, serializes
to **Avro** using a **Schema Registry**, and routes valid records to **Kafka**
(topic `telemetry`) while rejecting invalid ones. The Java `rmi-client`
consumes from Kafka with a `KafkaAvroDeserializer`, computes each measurement's
StressScore on the RMI cluster, and persists to **Cassandra**:

```
Go agent --HTTP--> NiFi (license check, enrich, Avro) --> Kafka (Avro/Schema Registry)
        --> rmi-client (manual ack + DLT) --> RMI cluster (StressScore) --> Cassandra
```

The cluster computes `StressScore = 0.4*CPU + 0.4*RAM + 0.2*Disk (+20 if
temperature > 80)`, clamped to `[0, 100]`. Storage is split between Cassandra
(`mediciones`, `ordenadores`, `empresas`) and MySQL (application data:
`empresa`, `administrador`, `usuario`, `licencia`, plus agent auth by license).
The middleware is **Java RMI + Apache Kafka**.

**No shared infrastructure.** Each node calls `LocateRegistry.createRegistry(port)`
on its own port and binds itself locally as `"ComputeNode"`. There is no
shared registry, no leader, no coordinator. The only thing every actor
(node or client) needs is a list of *seed* addresses — at least one of
which is reachable at bootstrap time.

**Gossip-based membership.** Each node holds a map of known members keyed
by `host:port`. Every 3 seconds it iterates the map, attempts a `gossip`
RPC with each peer, and merges the returned view. The RPC carries the
caller's `self` plus its view of the membership.

**Failure detection.** Three consecutive failed gossip rounds against a
peer (≈9 seconds of unreachability) eject the peer and record a 30-second
tombstone on its address, suppressing re-introduction via stale gossip
from third parties.

**First-hand proof of life beats tombstones.** When a peer directly
contacts us via gossip, its `self` parameter clears any tombstone we
hold on it. This is what makes restarts work: a node that comes back at
the same address rejoins immediately rather than waiting 30 seconds.
Second-hand "I heard X is alive" gossip still respects tombstones.

**Bootstrap.** If a node's member map ever drops to empty (lost partition,
fresh start, every peer evicted), it re-adds its seed list and retries.
A node can boot before any of its seeds are up — it'll keep trying.

**Client.** The client takes a seed list, attempts `gossip(null, {})`
against each in turn until one responds, caches the returned membership,
and round-robins. Per-call `RemoteException` falls through to the next
cached member; if every cached member fails, it refreshes from seeds
and retries once.

## What's *actually* SPoF-free here

| Failure                          | Result                                               |
|----------------------------------|------------------------------------------------------|
| Any one node dies                | Survivors evict, keep serving. Client fails over.    |
| Majority dies                    | The lone survivor still serves.                      |
| A killed node restarts           | Direct contact clears its tombstone, instant rejoin. |
| A seed in the client list is down| Client falls through to the next seed.               |
| Network partition                | Each side keeps operating on the members it can see. |

The only invariant you need is: **at boot time, at least one address
in each actor's seed list resolves to a live node.** That's "any-of-N",
not "this-specific-one", so list 3+ stable hosts and you're done.

## Build and run

```
mvn clean install
```

Three peer nodes, each pointing at the other two:

```
java -cp build cluster.ClusterNode node-A localhost 1099 localhost:1100 localhost:1101
java -cp build cluster.ClusterNode node-B localhost 1100 localhost:1099 localhost:1101
java -cp build cluster.ClusterNode node-C localhost 1101 localhost:1099 localhost:1100
```

Client with the same three as seeds:

```
java -cp build cluster.Client localhost:1099 localhost:1100 localhost:1101
```

Kill any combination of nodes mid-stream. Within ~9 seconds the survivors
log `Evicted (no response after 3 rounds): X` and drop the dead node.
The client keeps going against whoever's left, refreshing its view if
needed. Restart a node and it rejoins on first gossip; you'll see
`Tombstone cleared by direct contact: X` on the peer that admits it back.

## Real-world deployment notes

- **Pin RMI's stub hostname.** RMI embeds the server's hostname in the
  stub returned from a registry lookup. By default it uses
  `InetAddress.getLocalHost()`, which is often unreachable from other
  machines. Set `-Djava.rmi.server.hostname=<reachable-name-or-ip>` on
  every node.
- **Pin the export port for firewalls.** The constructor calls `super(0)`,
  which exports the remote object on an anonymous port. For firewalled
  networks, pass a fixed port to `super()` and open it.
- **Seed list lives in config, not in a registry.** Put 3+ seeds (or
  ideally a DNS A-record / SRV record returning multiple hosts) in your
  client config. The seed list is the only "I have to know something"
  step; everything after is discovered.
- **Wire encryption is supported.** We use JVM SSL properties (e.g. `-Djavax.net.ssl.trustStore`) for encryption across untrusted networks. Ver `RUN_WITH_TLS.md`.
- **Despliegue en cloud (GCP).** Todo el stack (Kafka + Client + 3 nodos) se sube con un solo comando: `cp .env.example .env` → editar → `./deploy-gcp.sh`. Ver `DEPLOY_GCP.md` para la guía completa (GCE turnkey y GKE).
- **Local stack with docker compose.** The published images are `rmi-server`
  (the `ClusterNode` peers) and `rmi-client` (the Kafka consumer). The core
  stack — Kafka + Schema Registry + Cassandra + 3 RMI nodes + client — comes up
  with `docker compose up`; layer the ingestion overlay (Apache NiFi + MySQL) on
  top with `docker compose -f docker-compose.yml -f docker-compose.ingest.yml up`.

## Known limits

- **No indirect probing.** If node A can't reach node B but C can, A
  will still evict B. Real gossip protocols (SWIM) ask K third parties
  to probe before declaring dead. For a small LAN cluster this is
  usually fine; on a flaky network you'd want to add it.
- **Split-brain is silent.** If the cluster partitions, each side keeps
  serving on the assumption the other side is dead. For a stateless
  service like a Compute Engine, that's the right behaviour. For anything that
  mutates state, you need a consensus protocol (Raft, Paxos) on top.
- **`processTelemetry` consumes from Kafka.** Telemetry now flows over an
  Apache Kafka topic (`telemetry`) using Avro with a Schema Registry. The
  consumer uses **manual offset commit** (committed only after the batch is
  processed) plus a **dead-letter topic** (`telemetry.DLT`), giving
  at-least-once semantics. For each measurement the StressScore is computed on
  the RMI cluster (round-robin + failover) and persisted to Cassandra
  (keyspace `webhardmon`, table `mediciones`). Ensure Kafka, the Schema
  Registry and Cassandra are reachable.
- **O(N²) gossip.** Every node pings every other peer every round.
  Fine up to dozens of nodes; beyond that, sample a random K peers per
  round instead.

# 🖥️ Guía de Inicio del Servidor Clúster (ClusterNode)

Esta guía explica detalladamente cómo compilar, configurar e iniciar los nodos del clúster de procesamiento distribuido (`ClusterNode`) en el proyecto, tanto en modo estándar (sin TLS) como en modo seguro (con TLS/SSL).

---

## 📋 Requisitos Previos

Antes de arrancar los servidores, asegúrate de tener instalado y configurado lo siguiente en tu sistema:
1. **Java JDK 21 o superior**: El clúster utiliza **Virtual Threads** (hilos virtuales) introducidos de forma estable en Java 21 para lograr una concurrencia masiva y no bloqueante.
2. **Apache Maven**: Herramienta de compilación y gestión de dependencias para proyectos Java.
3. **Kafka**: Debe estar ejecutándose localmente (por ejemplo, en un contenedor Docker en el puerto `9092` / `9094`) para que la inyección de telemetría funcione correctamente a través del cliente.
   ```bash
   docker compose up -d kafka
   ```

---

## 🛠️ Paso 1: Compilación del Proyecto

Antes de ejecutar los nodos, es necesario compilar todos los submódulos (`common`, `server`, `client`) con Maven para generar los archivos `.jar` empaquetados.

Ejecuta el siguiente comando desde la raíz del workspace:

```bash
mvn clean package -DskipTests
```

**Salida esperada:**
Esto compilará los módulos y colocará los ejecutables en sus respectivas carpetas:
- El servidor compilado se ubicará en: `server/target/server-1.0-SNAPSHOT.jar`
- El cliente compilado se ubicará en: `client/target/client-1.0-SNAPSHOT.jar`

---

## 🏃 Paso 2: Ejecución de Nodos (Sin TLS)

En el modo estándar sin cifrado, los nodos se comunican en texto claro a través de la red RMI.

### Sintaxis del Comando:
```bash
java -cp server/target/server-1.0-SNAPSHOT.jar cluster.ClusterNode <nodeId> <host> <port> [seedHost:Port ...]
```

### Parámetros Explicados:
1. `<nodeId>`: Nombre único que identifica al nodo en la red (ej. `node-1`).
2. `<host>`: Dirección IP o hostname del servidor donde se ejecuta el nodo (usualmente `localhost` para pruebas locales).
3. `<port>`: Puerto en el que este nodo levantará su propio RMI Registry local (ej. `6100`).
4. `[seedHost:Port ...]`: Lista de direcciones "semilla" (nodos de bootstrap). El nodo intentará conectarse a estas direcciones para descubrir a los demás miembros del clúster a través del protocolo *Gossip*. Al menos una semilla debe ser accesible en el arranque.

### Ejemplo de Arranque de un Clúster de 3 Nodos:

Abre tres terminales independientes y ejecuta en cada una de ellas lo siguiente:

* **Terminal 1 (Nodo 1 en puerto 6100):**
  ```bash
  java -cp server/target/server-1.0-SNAPSHOT.jar cluster.ClusterNode node-1 localhost 6100 localhost:6100 localhost:6101 localhost:6102
  ```

* **Terminal 2 (Nodo 2 en puerto 6101):**
  ```bash
  java -cp server/target/server-1.0-SNAPSHOT.jar cluster.ClusterNode node-2 localhost 6101 localhost:6100 localhost:6101 localhost:6102
  ```

* **Terminal 3 (Nodo 3 en puerto 6102):**
  ```bash
  java -cp server/target/server-1.0-SNAPSHOT.jar cluster.ClusterNode node-3 localhost 6102 localhost:6100 localhost:6101 localhost:6102
  ```

---

## 🔐 Paso 3: Ejecución de Nodos (Con TLS/SSL)

Para entornos de producción o redes inseguras, se recomienda cifrar todo el tráfico RMI y el intercambio Gossip mediante certificados TLS/SSL.

### 🔑 A. Generar Certificados (Keystore)
Primero, debes generar el archivo de certificados `server.keystore`. Ejecuta el script automatizado provisto en la raíz del proyecto:

* **En Windows (CMD / PowerShell):**
  ```cmd
  generate-certs.bat
  ```
* **En Linux / Mac:**
  ```bash
  chmod +x generate-certs.sh
  ./generate-certs.sh
  ```

Esto creará un keystore auto-firmado llamado `server.keystore` con la contraseña predeterminada `changeit`.

### 🚀 B. Iniciar los Nodos en Modo TLS
Para activar TLS en la JVM, se deben inyectar dos propiedades del sistema Java mediante la bandera `-D` antes del comando de ejecución:
- `javax.net.ssl.keyStore`: Ruta al almacén de claves (keystore).
- `javax.net.ssl.keyStorePassword`: Contraseña del keystore (ej. `changeit`).

Abre tres terminales independientes y ejecuta lo siguiente:

* **Terminal 1 (Nodo 1 con TLS):**
  ```bash
  java -Djavax.net.ssl.keyStore=server.keystore -Djavax.net.ssl.keyStorePassword=changeit -cp server/target/server-1.0-SNAPSHOT.jar cluster.ClusterNode node-1 localhost 6100 localhost:6100 localhost:6101 localhost:6102
  ```

* **Terminal 2 (Nodo 2 con TLS):**
  ```bash
  java -Djavax.net.ssl.keyStore=server.keystore -Djavax.net.ssl.keyStorePassword=changeit -cp server/target/server-1.0-SNAPSHOT.jar cluster.ClusterNode node-2 localhost 6101 localhost:6100 localhost:6101 localhost:6102
  ```

* **Terminal 3 (Nodo 3 con TLS):**
  ```bash
  java -Djavax.net.ssl.keyStore=server.keystore -Djavax.net.ssl.keyStorePassword=changeit -cp server/target/server-1.0-SNAPSHOT.jar cluster.ClusterNode node-3 localhost 6102 localhost:6100 localhost:6101 localhost:6102
  ```

> [!IMPORTANT]
> **El Cliente RMI también debe usar TLS:**
> Si los nodos del servidor se arrancan con TLS, el cliente RMI (`Client`) fallará al conectarse a menos que se ejecute también configurando el truststore:
> ```bash
> java -Djavax.net.ssl.trustStore=server.keystore -Djavax.net.ssl.trustStorePassword=changeit -cp client/target/client-1.0-SNAPSHOT.jar cluster.Client localhost:6100 localhost:6101 localhost:6102
> ```

---

## 🔍 Parámetros Adicionales de la JVM

Al desplegar el servidor en red o depurar conexiones, te resultarán de gran utilidad los siguientes parámetros de ejecución de la JVM:

| Propiedad | Ejemplo / Valor | Utilidad / Propósito |
|---|---|---|
| `-Djava.rmi.server.hostname` | `-Djava.rmi.server.hostname=192.168.1.50` | Fuerza a RMI a exponer esta dirección IP en el Stub en lugar de `localhost`. Imprescindible para comunicaciones entre múltiples máquinas reales. |
| `-Djavax.net.debug` | `-Djavax.net.debug=ssl:handshake` | Muestra en consola la traza de depuración completa del handshake TLS/SSL en cada conexión RMI. Útil si las llamadas TLS fallan. |

---

## ⚠️ Solución de Problemas del Servidor

### 1. Error: `java.rmi.server.ExportException: Port already in use: 6100`
* **Causa**: Ya hay una instancia de un nodo (u otro proceso) corriendo en ese puerto.
* **Solución**: Cierra los procesos Java huérfanos que hayan quedado activos en segundo plano.
  * **En Windows (PowerShell)**: `Stop-Process -Name java -Force` o `taskkill /F /IM java.exe` en CMD.
  * **En Linux/Mac**: `pkill -f "ClusterNode"` o `killall java`.

### 2. Los nodos no se descubren entre sí (Vista de miembros vacía)
* **Causa**: El puerto Gossip no es accesible, o la primera semilla indicada no está corriendo todavía.
* **Solución**: 
  - Asegúrate de arrancar primero el nodo que actúa como la semilla principal.
  - Verifica que los firewalls locales no bloqueen los puertos `6100`, `6101` y `6102`.
  - Si estás en Docker, asegúrate de que todos los contenedores pertenezcan a la misma red puente.

### 3. Error `javax.net.ssl.SSLException` o `SSLHandshakeException`
* **Causa**: El cliente y el servidor no coinciden en la configuración SSL, falta el keystore, o el password suministrado es incorrecto.
* **Solución**: Regenera el keystore con `generate-certs.bat` y asegúrate de que tanto el comando del nodo como el del cliente apunten a la ruta exacta y usen el password correcto (`changeit`).
    </script>

# 📖 Guía de Ejecución y Resultados del Cluster

Este documento explica cómo funciona el flujo de datos entre el agente de monitoreo (Go), el gateway de ingesta (Apache NiFi), el bus de mensajería (Apache Kafka) y la malla de procesamiento distribuido (Java RMI), y detalla cómo interpretar los resultados obtenidos en las pruebas de ejecución y failover.

---

## 🏗️ Flujo de Datos

```text
┌────────────────┐   HTTP POST    ┌──────────────┐   Avro    ┌──────────────┐
│   Agente Go    │ ──(X-License──►│  Apache NiFi │ ──+SR───► │ Apache Kafka │
│ (Métricas CPU/ │     Code)      │  (Gateway de │           │  (topic      │
│  RAM/Disk/Temp)│                │   ingesta)   │           │  "telemetry")│
└────────────────┘                └──────┬───────┘           └──────┬───────┘
                                  Valida  │ licencia (MySQL)         │
                                  Enriquece (empresa_id, nombre)     │ KafkaConsumer
                                  Serializa Avro + Schema Registry   │ (ack manual +
                                  Rechaza inválidos                  │  dead-letter)
                                                                     ▼
                                                            ┌──────────────┐
                                                            │ Cliente Java │
                                                            │ (RMI Bridge) │
                                                            └──────┬───────┘
                                                       Balanceo /  │ RMI
                                                         Failover  │ (round-robin)
                                                                   ▼
                                              ┌────────────────┐       ┌──────────────┐
                                              │  Cluster Java  │       │  Cassandra   │
                                              │ (Virtual Th.)  │       │ (mediciones) │
                                              └────────────────┘       └──────────────┘
                                                  StressScore    ──persiste──►
```

1. **Agente Go (collector)**: Inspecciona el sistema operativo usando `gopsutil` en intervalos regulares (CPU/RAM/Disco/Temperatura) y envía cada lectura mediante **HTTP POST** al gateway de ingesta **Apache NiFi**, incluyendo cabeceras de licencia (`X-License-Code` = código y `X-Portatil`). Ya no publica directamente en ningún broker.
2. **Apache NiFi (gateway de ingesta)**: Valida la licencia recibida contra **MySQL** (debe estar activa), enriquece el registro con `empresa_id` y `nombre`, serializa la métrica a **Avro** apoyándose en el **Schema Registry**, enruta los mensajes válidos al topic de **Kafka** y rechaza los inválidos.
3. **Apache Kafka (topic `telemetry`)**: Actúa como bus asíncrono entre la ingesta y el procesamiento. Los mensajes viajan en **Avro** con gobierno de esquema vía **Schema Registry** (puerto 9092 interno / 9094 externo).
4. **Cliente Java (`rmi-client`)**: Un `KafkaConsumer` con `KafkaAvroDeserializer` consume el topic `telemetry`. Usa **ACK manual** (hace commit del offset tras procesar correctamente el lote) y una cola **dead-letter** (`telemetry.DLT`), garantizando semántica *at-least-once*. Actúa como puente ("bridge") despachando cada métrica al cluster Java mediante llamadas **RMI**.
5. **Nodos del Cluster Java (`ClusterNode`)**:
   - Cada nodo hospeda su propio registro RMI de forma distribuida (P2P, sin un servidor central ni SPOF).
   - Utilizan un protocolo de **Gossip (chisme)** periódico en segundo plano para informarse mutuamente qué nodos están vivos o cuáles han caído (evicción).
   - Al recibir el paquete Avro, calculan un **Stress Score** en paralelo mediante **Virtual Threads** (Java 21).
6. **Persistencia (Cassandra)**: Una vez calculado el Stress Score, el cliente **persiste la medición en Cassandra** (keyspace `webhardmon`, tabla `mediciones`). MySQL queda como base de datos de la aplicación (empresa, administrador, usuario, licencia) y soporte de autenticación por licencia.

---

## 🛠️ Ajustes Realizados para la Integración

1. **Ingesta vía NiFi + Kafka**: El agente Go (`SubscriberKafka.go`) dejó de publicar directamente en un broker y ahora envía las métricas por **HTTP POST a Apache NiFi**, que valida la licencia, serializa a Avro con Schema Registry y enruta a **Kafka** (topic `telemetry`). El `Client.java` consume ese topic mediante un `KafkaConsumer`.
2. **Fiabilidad de la entrega**: El consumidor implementa **ACK manual** (commit tras procesar el lote) y **dead-letter** (`telemetry.DLT`), logrando entrega *at-least-once* y aislando los mensajes problemáticos.
3. **Gobierno del esquema**: El **Schema Registry** centraliza y versiona el esquema Avro compartido entre NiFi (productor) y el cliente Java (consumidor).
4. **Compatibilidad de Compilación**: Se redujo el requerimiento de versión en `go.mod` (`go 1.22+`) y se ejecutó `go mod tidy` para garantizar que compile sin errores en entornos estándares.

---

## 🚀 Cómo iniciar el sistema en local

### 1. Levantar el stack con Docker Compose
El **core** del sistema (Kafka + Schema Registry + Cassandra + los 3 nodos RMI + el cliente) se levanta con un único comando:
```bash
docker compose up -d
```
Para añadir el **overlay de ingesta** (Apache NiFi + MySQL), combina ambos ficheros:
```bash
docker compose -f docker-compose.yml -f docker-compose.ingest.yml up -d
```
Con esto quedan operativos el bus de Kafka (topic `telemetry`), el Schema Registry, Cassandra (keyspace `webhardmon`), los nodos del clúster RMI, el cliente consumidor y el gateway NiFi validando licencias contra MySQL.

### 2. (Opcional) Arrancar los Nodos Java manualmente
Si prefieres ejecutarlos fuera de contenedores, compila el proyecto Java:
```bash
mvn clean package
```
Inicia tres nodos en distintas terminales usando diferentes puertos RMI:
```bash
# Terminal 1 (Nodo 1)
java -cp "server/target/server-1.0-SNAPSHOT.jar" cluster.ClusterNode node-1 localhost 6100 localhost:6100 localhost:6101 localhost:6102

# Terminal 2 (Nodo 2)
java -cp "server/target/server-1.0-SNAPSHOT.jar" cluster.ClusterNode node-2 localhost 6101 localhost:6100 localhost:6101 localhost:6102

# Terminal 3 (Nodo 3)
java -cp "server/target/server-1.0-SNAPSHOT.jar" cluster.ClusterNode node-3 localhost 6102 localhost:6100 localhost:6101 localhost:6102
```
Y el cliente Java (consumidor de Kafka / puente RMI):
```bash
java -cp "client/target/client-1.0-SNAPSHOT.jar" cluster.Client localhost:6100 localhost:6101 localhost:6102
```

### 3. Ejecutar el Agente Go
El agente envía las métricas al gateway NiFi (modo *publisher*), incluyendo el código de licencia y el identificador del portátil:
```bash
go run . -mode=publisher -nifi-url=http://localhost:8080/contentListener -codigo=TU_CODIGO_LICENCIA -portatil=PC-01
```
> Ejecuta el comando desde el directorio `AgenteGo-main/` (donde reside `SubscriberKafka.go`). Ajusta `-nifi-url`, `-codigo` y `-portatil` a tu entorno.

---

## 📊 Interpretación de Resultados de Prueba

### Envío de Métricas Normales (Go)
El Agente Go recopila las métricas de hardware del sistema:
```text
Iniciando servicio de recolección métricas en segundo plano...
Se enviarán métricas a NiFi/Kafka cada 5 minutos.
[2026-05-20 08:42:58] Datos recolectados normales: {Timestamp:1779266578 CPUPercent:1.182327318355726 CPUModel:12th Gen Intel(R) Core(TM) i7-12650H RAMPercent:23.011672656562755 RAMTotal:8175046656 DiskPercent:9.89245871010225 DiskTotal:1081101176832 Temp:<nil>}
[2026-05-20 08:42:58] datos enviados correctamente a NiFi/Kafka
```
* **Interpretación**: Indica que el recolector de Go accedió al hardware del host (o contenedor) y envió la lectura por HTTP POST a NiFi, que validó la licencia, la serializó en formato Avro (con Schema Registry) y la publicó exitosamente en el topic `telemetry` de Kafka.

### Procesamiento y Enriquecimiento (Java)
El nodo que recibe la llamada RMI ejecuta el pipeline ETL y visualiza la información formateada:
```text
[node-2 | Thread: ] ETL Procesado.
  - CPU Model: 12th Gen Intel(R) Core(TM) i7-12650H (1,18%)
  - RAM Total: 7,61 GB (23,01%)
  - Disk Total: 1006,85 GB (9,89%)
  - Temp: N/A
  - Stress Score: 11,66 / 100
```
* **Interpretación**: 
  - La llamada RMI funcionó correctamente y deserializó el registro Avro completo.
  - Las capacidades de memoria y disco se convirtieron de bytes a Gigabytes (GB) de forma legible para el operador (`7,61 GB` y `1006,85 GB`).
  - La temperatura se muestra como `N/A` porque el agente de Go se ejecuta dentro de un contenedor virtualizado (Docker Desktop en Windows) donde la interfaz térmica de Linux no está disponible.
  - El **Stress Score** de `11,66 / 100` se calculó usando la ponderación: `(1,18% * 0.4) + (23,01% * 0.4) + (9,89% * 0.2)`. 

### Comportamiento ante Caídas (Failover RMI)
Cuando apagamos `node-2` e iniciamos otro envío desde el agente de Go, el cliente Java muestra:
```text
[x] Received Avro Telemetry (38 bytes)
node-2@localhost:6101 failed (ConnectException), trying next...
-> dispatching telemetry to node-1@localhost:6100
```
Y en los logs del cluster se reporta:
```text
Evicted (no response after 3 rounds): node-2@localhost:6101
[node-1] view: [node-3@localhost:6102]
```
  - **Evicción**: Los nodos del cluster detectaron que `node-2` ya no responde a los pings de Gossip y lo eliminaron de la vista de miembros de forma descentralizada.
  - **Failover automático**: El Cliente Java detectó la desconexión del nodo asignado en su cola Round-Robin, reintentó la petición con el siguiente nodo vivo (`node-1`) y procesó el mensaje sin pérdida de información.

## 📈 Pruebas de Rendimiento y Justificación Cuantitativa

Para cumplir con los requisitos del proyecto, se ha desarrollado un banco de pruebas (`cluster.Benchmark`) que permite ejecutar y analizar comparativamente las estrategias de paralelización a nivel de nodo y a nivel de clúster.

### 1. Benchmark de Concurrencia (Nivel de Nodo)
Esta prueba evalúa tres estrategias diferentes ejecutando **500 tareas simultáneas** que simulan el cálculo del **Stress Score** y un pipeline ETL ligero, seguido de una espera bloqueante de I/O de 15ms (escrituras simuladas en disco/BD):

| Estrategia de Concurrencia | Tiempo Total (ms) | Rendimiento (tareas/seg) | Factor de Aceleración (Speedup) | Hilos Físicos de OS Activos |
| :--- | :---: | :---: | :---: | :---: |
| **Secuencial (Bloqueante)** | 10.294 ms | 48,6 tareas/seg | 1,00x (Base) | 1 |
| **Hilos de Plataforma (Pool=20)** | 731 ms | 684,0 tareas/seg | 14,08x | 20 (fijo) |
| **Hilos Virtuales (Java 21 Loom)** | **150 ms** | **3.333,3 tareas/seg** | **68,63x** | **1** (Portador) |

#### 🧠 Justificación Cuantitativa de Hilos Virtuales:
- **Evitación del Bloqueo**: Con Hilos Virtuales, cuando la tarea se bloquea en la llamada de I/O (`Thread.sleep(15)`), el hilo virtual se "desmonta" del hilo portador físico del sistema operativo, permitiendo que otro hilo virtual use ese procesador. Esto elimina la penalización por cambio de contexto y el bloqueo físico de recursos.
- **Eficiencia en Recursos**: En lugar de requerir 500 hilos de plataforma (que consumirían ~500MB de memoria en pilas de hilos), los hilos virtuales ocupan apenas unos pocos kilobytes cada uno en el heap, permitiendo concurrencia masiva con un consumo mínimo de RAM y solo 1 hilo portador activo de OS.

---

### 2. Benchmark de Escalabilidad (Nivel de Clúster de Nodos Variables)
Esta prueba distribuye **150 tareas del pipeline de Stress Score (Modelo a Trozos + EWMA + P95/P99 + Z-Score + I/O)** en Round-Robin a través de RMI hacia un número variable de nodos de cálculo (`ClusterNode`) activos simultáneamente:

| Configuración del Clúster | Tiempo Total (ms) | Rendimiento Global (tareas/seg) | Comportamiento frente a Carga |
| :--- | :---: | :---: | :--- |
| **1 Nodo Activo** | 1.080 ms | 138,89 tareas/seg | Cuello de botella físico (todo el procesamiento secuenciado en un único nodo) |
| **2 Nodos Activos** | 573 ms | 261,78 tareas/seg | Distribución activa de carga round-robin entre 2 nodos, mejorando el rendimiento |
| **3 Nodos Activos** | 279 ms | 537,63 tareas/seg | Rendimiento óptimo, minimización de latencia y máxima paralelización de I/O |

#### 🧠 Justificación del Diseño Escalable:
- **Balanceo Round-Robin**: Al distribuir tareas de manera uniforme mediante el RMI Client, evitamos que un solo nodo actúe como cuello de botella.
- **Escalabilidad Horizontal**: Si bien en un benchmark local sobre una misma máquina física la aceleración se ve limitada por compartir la CPU y la interfaz de red *loopback* local, el diseño modular desacoplado del clúster garantiza que al desplegar nodos en **máquinas físicas diferentes**, la capacidad de cómputo del clúster escale de forma lineal al aprovechar los cores y ancho de banda independientes de cada máquina del nodo de cálculo.
- **Descubrimiento Dinámico sin SPOF**: La adición o eliminación de nodos se propaga mediante Gossip de manera autónoma, permitiendo adaptar la topología según la demanda de forma flexible y tolerante a fallos.

# 📊 Proyecto: Cluster RMI sin Punto Único de Fallo

## 🎯 ¿Qué es este proyecto?

Es un **sistema de cluster distribuido** hecho en Java RMI donde múltiples nodos pueden comunicarse entre sí de forma peer-to-peer (de igual a igual) **sin necesidad de un servidor central**. El cliente puede conectarse a cualquier nodo, y si falla uno, automáticamente se conecta a otro.

Es como una red de computadoras donde cada una es independiente, pero todas se conocen entre sí y trabajan juntas.

---

## 🏗️ Arquitectura del Sistema

```
┌─────────────────────────────────────────────────────────────┐
│                         CLIENTE                             │
│  (Bootstrap → Round-Robin → Failover)                      │
└─────────────────────────────────────────────────────────────┘
                          ↓ ↓ ↓
        ┌─────────────────┼─────────────────┐
        ↓                 ↓                 ↓
   ┌─────────┐       ┌─────────┐       ┌─────────┐
   │  NODE 1 │◄─────►│  NODE 2 │◄─────►│  NODE 3 │
   │ (Gossip)│       │ (Gossip)│       │ (Gossip)│
   └─────────┘       └─────────┘       └─────────┘
     RMI:6100         RMI:6101         RMI:6102
```

### Características clave:

1. **Sin punto único de fallo**: No hay servidor central. Cada nodo es independiente.
2. **RMI (Java Remote Method Invocation)**: Comunicación remota entre máquinas Java.
3. **Descubrimiento automático**: Los nodos se conocen entre sí mediante gossip (chismes).
4. **Resiliencia**: Si un nodo cae, los demás siguen funcionando.
5. **Bootstrap desde semillas**: El cliente solo necesita saber la dirección de al menos un nodo para empezar.

---

## 🌐 Pipeline Extremo a Extremo (WebHardMon)

El cluster RMI es el motor de cómputo dentro de un pipeline de telemetría más amplio. El flujo completo es:

```
┌──────────────┐   HTTP POST     ┌──────────────────────┐   Avro     ┌──────────────┐
│  Agente Go   │  X-License-Code │   Apache NiFi        │  + Schema  │ Apache Kafka │
│ (collector)  │ ──────────────► │  (gateway ingesta)   │ ─Registry─►│ topic        │
│ CPU/RAM/disco│  X-Portatil     │ valida licencia      │  Registry  │ "telemetry"  │
│ temperatura  │                 │ vs MySQL (activa),   │            │ 9092/9094    │
└──────────────┘                 │ serializa a Avro,    │            └──────┬───────┘
                                  │ enriquece empresa_id │                   │
                                  │ y nombre_ordenador,  │                   │ KafkaConsumer
                                  │ enruta válidos /     │                   │ (Avro deser.)
                                  │ rechaza inválidos    │                   ▼
                                  └──────────────────────┘            ┌──────────────┐
                                                                      │ Client Java  │
                          ┌───────────────────────────────────────── │ (rmi-client) │
                          │  RMI: StressScore (round-robin + failover)│ ack MANUAL + │
                          ▼                                           │ dead-letter  │
                  ┌────────────────────────┐                         │ (telemetry.  │
                  │  Cluster RMI x3         │                         │  DLT)        │
                  │  (ClusterNode, gossip,  │                         └──────┬───────┘
                  │  Virtual Threads J21)   │                                │ persiste
                  │  StressTask:            │                                ▼
                  │  0.4*CPU+0.4*RAM+0.2*Dco│                         ┌──────────────┐
                  │  (+20 si temp>80)       │                         │  Cassandra   │
                  │  acotado a [0,100]      │                         │ keyspace     │
                  └────────────────────────┘                         │ webhardmon   │
                                                                      │ (mediciones) │
                                                                      └──────────────┘
```

### Componentes del pipeline

1. **Agente Go (collector)**: mide CPU/RAM/disco/temperatura. Ya **no** publica directo a Kafka: hace `HTTP POST` a un gateway Apache NiFi con cabeceras de licencia (`X-License-Code` = código, `X-Portatil`).
2. **Apache NiFi (gateway de ingesta)**: valida la licencia del agente contra la BD de aplicación en **MySQL** (debe estar activa), serializa a **Avro** usando un **Schema Registry**, enruta los válidos a Kafka y rechaza los inválidos. Enriquece con `empresa_id` y `nombre` (`nombre_ordenador`).
3. **Apache Kafka** (topic `telemetry`, 9092 interno / 9094 externo): bus asíncrono. Avro en el cable con **Schema Registry** (Confluent/Apicurio) como fuente única del esquema.
4. **Client Java (rmi-client)**: `KafkaConsumer` con `KafkaAvroDeserializer`. **ACK MANUAL** (commit del offset solo tras procesar el lote) + **DEAD-LETTER** (topic `telemetry.DLT`) ⇒ entrega **at-least-once**. Calcula el StressScore en el cluster por RMI y **persiste en Cassandra** (keyspace `webhardmon`, tabla `mediciones`).
5. **Cluster RMI (rmi-server x3)**: P2P sin punto único de fallo, descubrimiento por gossip, **Virtual Threads (Java 21)**. Ejecuta `StressTask`.
6. **Almacenamiento**: **Cassandra** (`mediciones` = serie temporal, `ordenadores` = inventario, `empresas`) y **MySQL** = BD de la aplicación (empresa, administrador, usuario, licencia) y autenticación de agentes por licencia.

### Middleware

- **Java RMI**: cómputo distribuido (cálculo del StressScore en el cluster).
- **Apache Kafka**: mensajería asíncrona (topic `telemetry`, grupo `telemetry_java_consumers`).

> El proyecto **ya no usa RabbitMQ/AMQP**. Toda la mensajería pasa por Kafka.

### Fiabilidad y seguridad

- **TLS opcional** en RMI.
- **Autenticación de agentes por licencia** (`codigo`) verificada en NiFi contra MySQL.
- **Ack manual + dead-letter** en Kafka.
- **Failover** RMI (round-robin + reintentos).
- **Gobierno de esquema** con Schema Registry.

---

## 📁 Explicación de Cada Archivo

### 1. **Endpoint.java** 🗺️
**¿Qué es?** Una clase que representa la identidad de red de un nodo.

```
┌──────────────────┐
│ Endpoint         │
├──────────────────┤
│ nodeId: String   │  <- Identificador único del nodo
│ host: String     │  <- IP o hostname (ej: localhost)
│ port: int        │  <- Puerto RMI (ej: 6100)
└──────────────────┘
```

**Funciones principales:**
- `parse("localhost:6100")`: Convierte un string en un Endpoint
- `addr()`: Devuelve "host:port" como clave única
- Implementa `Serializable` para poder enviarse por RMI

**Analogy**: Es como el DNI de una persona, pero para un nodo del cluster.

---

### 2. **ComputeService.java** 📡
**¿Qué es?** Una interfaz remota que define qué operaciones puede hacer cada nodo.

```java
Interface ComputeService (Remote)
├── getNodeId() → String
├── ping() → long (prueba que esté vivo)
├── executeTask(Task<T>) → T (motor de computación genérico)
├── processTelemetry(byte[]) → void (procesamiento ETL de Avro)
└── gossip(sender, theirView) → Set<Endpoint> (descubrimiento)
```

**¿Por qué Remote?** Para que otros programas Java puedan llamar estos métodos a través de la red.

**¿Qué hace cada método?**
- `executeTask(Task<T>)`: Ejecuta una tarea genérica enviada por el cliente (Compute Engine).
- `processTelemetry(byte[])`: Procesa métricas en formato Avro a través de Virtual Threads, calculando el Stress Score.
- `gossip(...)`: Intercambia información sobre qué nodos existen (protocolo anti-entropy).
- `ping()`: Verifica que el nodo siga vivo.

---

### 3. **ClusterNode.java** 🖥️
**¿Qué es?** Un nodo del cluster. Es el "servidor" que:
- Crea su propio registro RMI
- Escucha en un puerto específico
- Se comunica con otros nodos via gossip
- Ejecuta tareas (compute)

**Estructura interna:**

```
┌────────────────────────────────────────┐
│         ClusterNode (Nodo)             │
├────────────────────────────────────────┤
│ self: Endpoint                         │ ← Quién soy
│ seeds: List<Endpoint>                  │ ← Nodos de arranque
│ members: Map<String, Endpoint>         │ ← Nodos que conozco
│ failures: Map<String, Int>             │ ← Fallos de cada nodo
│ tombstones: Map<String, Long>          │ ← Nodos muertos (temp)
├────────────────────────────────────────┤
│ Ejecuta cada 3 segundos:               │
│ - Intenta gossip con cada miembro      │
│ - Cuenta fallos (max 3)                │
│ - Evicta si fallos >= 3                │
│ - Crea tombstone por 30 segundos       │
└────────────────────────────────────────┘
```

**¿Qué es el Gossip?**
Es como si los nodos chismearan entre sí:
- "Hola, soy NODE-1 y conozco a NODE-2 y NODE-3"
- "OK, actualicé mi lista de miembros conocidos"
- Si no responde 3 veces → Lo marcamos como muerto (tombstone)
- Si se reinicia → El tombstone se borra automáticamente

**¿Qué es un Tombstone?**
Una marca que dice "este nodo estaba muerto". Evita que otros nodos sigan intentando conectar a una dirección que ya no existe.

---

### 4. **Client.java** 👤
**¿Qué es?** El programa que USA el cluster. Es quien pide operaciones.

**Flujo de trabajo:**

```
1. Bootstrap
   ├─ "Dame la lista de nodos conocidos"
   └─ Solo necesita 1 nodo respondiendo

2. Cache + Round-Robin
   ├─ Guarda lista de miembros
   ├─ Alterna entre ellos (NODE-1 → NODE-2 → NODE-3 → NODE-1)
   └─ Esto balancea carga

3. Failover (si falla)
   ├─ Intenta siguiente nodo
   └─ Si todos fallan → Refresca lista y reintenta

4. Ejecuta tarea
   └─ processTelemetry(valor) en cualquier nodo disponible
```

**¿Qué simula el cliente?**
- Un puente (consumidor) que recibe datos desde Apache Kafka y los pasa al cluster.
- En el `main()` se conecta a Kafka (usando Virtual Threads) como `KafkaConsumer` con `KafkaAvroDeserializer` (Schema Registry), consumiendo del topic `telemetry` dentro del grupo `telemetry_java_consumers`.
- Por cada mensaje Avro recibido, calcula el StressScore por RMI (`processTelemetry(payload)` en un nodo del cluster) y persiste el resultado en Cassandra (keyspace `webhardmon`, tabla `mediciones`).
- Garantía **at-least-once**: ACK MANUAL (commit del offset solo tras procesar el lote) + DEAD-LETTER (topic `telemetry.DLT`) para los mensajes que fallan.
- Simula: **Ingesta asíncrona, balanceo de carga, recuperación de fallos, y descubrimiento dinámico**.

---

## 🔄 Flujo Completo: Paso a Paso

### Escenario: Cliente quiere procesar telemetría `processTelemetry(payload)`

```
┌─────────────────────────────────────────────────────────────┐
│ CLIENT (KafkaConsumer del topic "telemetry", Avro)           │
└─────────────────────────────────────────────────────────────┘
                              │
                    ¿Conozco miembros?
                     │         │
                    NO        SÍ
                     │         │
                [REFRESH]   [CACHE]
                     │         │
              Llamo a seed    Intento nodo siguiente
              (NODE-1)        (NODE-2)
                     │         │
              "Dame lista"  "Procesa telemetría (Avro)"
                     │         │
              ✓ Responde    ✓ Responde y calcula StressScore
                     │         │
             Guardo lista    Persiste en Cassandra +
             [members]       commit MANUAL del offset
                     │        (fallo → topic telemetry.DLT)
            Siguiente mensaje
            round-robin
            (NODE-3)
```

---

## 📊 Escenarios de Fallos y Recuperación

### Escenario 1: Un nodo se cae

```
Antes:  NODE-1 ✓  NODE-2 ✓  NODE-3 ✓
                    ↓ (cae)
Después: NODE-1 ✓  NODE-2 ✗  NODE-3 ✓

Cliente:
- Intenta NODE-2: FALLA ❌
- Automáticamente intenta NODE-3: OK ✓
- El cliente NO se da cuenta del fallo (transparente)
- Gossip marca NODE-2 con tombstone por 30s
```

### Escenario 2: Partición de red (cliente aislado)

```
Antes:  [CLIENT] ←→ NODE-1 ✓
               ↓ (corte de red)
Después: [CLIENT] ✗ NODE-1 ✓

Cliente intenta processTelemetry():
- Intenta NODE-1: TIMEOUT ❌
- Refresca lista de miembros: FALLA (sin conexión)
- Lanza excepción: "All members failed even after a refresh"
- Al no hacer commit del offset (ACK MANUAL), Kafka re-entregará el mensaje (at-least-once)
```

### Escenario 3: Nodo se reinicia

```
NODE-1: MUERTO (tombstone 30s) ✓
           ↓ (se reinicia)
NODE-1: VIVO (en la misma dirección IP:puerto)

Gossip recibe:
- contacto directo de NODE-1 → Borra tombstone INMEDIATAMENTE
- NODE-1 se reúne al cluster sin esperar 30s
```

## 🎓 Preguntas Frecuentes

### P1: ¿Por qué necesita "semillas" (seeds)?
**R:** El bootstrap es el problema. Cuando un cliente arranca, no conoce a ningún nodo.
Las semillas son direcciones conocidas del cluster que dice "prueba en estas direcciones".
Si al menos UNA responde, el cliente obtiene la lista completa de todos.

### P2: ¿Qué es RMI?
**R:** Remote Method Invocation. Permite llamar métodos en objetos de otras máquinas Java como si estuvieran locales.
```java
// En máquina remota
Registry reg = LocateRegistry.getRegistry("localhost", 6100);
ComputeService stub = (ComputeService) reg.lookup("ComputeNode");
stub.processTelemetry(payload);  // ¡Llamada remota!
```

### P3: ¿Qué pasa si TODOS los nodos se caen?
**R:** El cluster está muerto. El cliente lanzará excepción.
Pero si se reinician, se recuperan automáticamente porque cada nodo re-añade sus semillas.

### P4: ¿Cómo detecta que un nodo está muerto?
**R:** Por timeout de RMI (3 fallos = ~9 segundos de silencio) + gossip periódico.
No es un heartbeat explícito, sino por falta de respuesta en gossip.

### P5: ¿Por qué se llama "anti-entropy" al gossip?
**R:** Porque el gossip reduce la entropía (desorden) del sistema.
Todos los nodos gradualmente convergen a la misma vista de membresía.

### P6: ¿Qué es "round-robin"?
**R:** Una técnica de balanceo: el cliente alterna entre nodos en orden circular.
```
Llamada 1 → NODE-1
Llamada 2 → NODE-2
Llamada 3 → NODE-3
Llamada 4 → NODE-1 (vuelta al inicio)
```

### P7: ¿Puede haber "split-brain" (dos clusters separados)?
**R:** SÍ. Si la red se particiona, cada parte funciona independientemente.
Cuando se reconecta, habrá un período de convergencia. Este diseño NO resuelve split-brain.

### P8: ¿Por qué los tombstones duran 30 segundos?
**R:** Balance entre:
- **Corto**: Rejoin rápido si reinicia
- **Largo**: Evita re-introducir nodos muertos por un tiempo

## 📈 Ventajas y Limitaciones

### ✅ Ventajas
- **Sin punto único de fallo** (SPOF)
- **Escalable**: Agregar nodos es trivial
- **Resiliente**: Aguanta caídas parciales
- **Simple**: Gossip es elegante y probado (BitTorrent, Cassandra, etc.)

### ❌ Limitaciones
- **Sin garantías de consistencia** (eventual consistency)
- **No resuelve split-brain** (particiones de red)
- **RMI es lento** (Java puro, sin protobuf/gRPC)
- **Encriptación vía TLS**: Implementada vía properties JVM (ver `RUN_WITH_TLS.md`)
- **Gossip periódico**: Detección de fallos toma tiempo

# 📘 Memoria Técnica y Documentación Global del Proyecto

Este documento proporciona una visión unificada, profunda y definitiva sobre la arquitectura, los componentes y la **justificación de las decisiones tecnológicas** del proyecto de Cluster RMI P2P y Telemetría.

## 1. 🎯 Visión General

El sistema es una **red distribuida de computación *Peer-to-Peer* (P2P) y procesamiento de telemetría sin Punto Único de Fallo (SPOF)**. Su propósito es recoger datos de hardware (telemetría), validarlos en una pasarela de ingesta, encolarlos para evitar pérdida de datos en picos de carga, distribuirlos a un enjambre de nodos de computación que se autodescubren mediante un protocolo *Gossip* y persistir el resultado.

A nivel funcional, el sistema:
1. **Recopila** métricas en máquinas externas (agentes Go).
2. **Valida y gobierna la ingesta** mediante un *gateway* Apache NiFi que autentica por licencia contra la BD de la aplicación (MySQL) y serializa a Avro con Schema Registry.
3. **Serializa y encola** de forma altamente eficiente en Apache Kafka.
4. **Distribuye** el cálculo (StressScore) a través de una malla P2P de nodos Java vía RMI.
5. **Persiste** las mediciones enriquecidas en Cassandra.
6. **Resiste** caídas de nodos, redireccionando el tráfico automáticamente de manera distribuida, con *ack* manual y *dead-letter* en el consumidor para garantía *at-least-once*.

    Gossip P2P      │(Compute)│        │(Compute)│        │(Compute)│

### Componentes Clave:
1. **Source (Agente Go):** Obtiene datos del sistema operativo y genera cargas útiles (*payloads*), que envía por HTTP al gateway de ingesta.
2. **Gateway de ingesta (Apache NiFi):** Se sitúa entre los agentes y Kafka. Autentica a cada collector por su **licencia** contra la BD de la aplicación (MySQL: tabla `licencia`, `activa = 1`), serializa a Avro gobernado por Schema Registry y publica en Kafka. Las licencias inactivas o inexistentes se rechazan con **HTTP 401**. (Detalle completo en `NIFI_GATEWAY.md`.)
3. **Buffer (Kafka):** Desacopla la emisión de datos de la capacidad y velocidad de procesamiento del cluster de Java. El topic `telemetry` transporta Avro con Schema Registry.
4. **Edge / Entrypoint (Cliente Java, `rmi-client`):** Actúa como un puente. Consume de Kafka con `KafkaAvroDeserializer`, calcula el StressScore vía RMI (balanceo Round-Robin tolerante a fallos) y persiste en Cassandra. Usa **ack manual** (`commitSync` con `enable.auto.commit=false`) y **dead-letter** (`telemetry.DLT`) para garantía *at-least-once*.
5. **Compute Grid (Servidores ClusterNode, `rmi-server` x3):** Malla de nodos que ejecutan el motor de cálculo genérico (`Task`), en particular `StressTask`. Mantienen su estado (quién está vivo/muerto) "cotilleando" (Gossip) entre sí.
6. **Almacenamiento:** **Cassandra** (keyspace `webhardmon`: tablas `mediciones`, `ordenadores`, `empresas`) para la serie temporal de telemetría, y **MySQL** como BD de la aplicación (empresa, administrador, usuario, licencia; autenticación de los agentes por licencia).

## 3. 🧠 Justificación Tecnológica (Stack)

Cada tecnología en este ecosistema no fue elegida al azar, sino que resuelve un problema específico del procesamiento o la arquitectura en red.

### 🌟 3.1. Java 21 y Virtual Threads (Project Loom)
En la parte del procesamiento RMI (Motor de Cálculo) y el puente (Cliente), la concurrencia tradicional generaría "cuellos de botella" graves: RMI bloquea los hilos durante la conexión y espera.
- **Justificación:** Los *Virtual Threads* permiten instanciar millones de hilos superligeros que se "aparcan" gratis cuando esperan I/O (la red), evitando que el motor se sature.
- **Resultado:** En nuestra implementación, el procesamiento concurrente de telemetría de Kafka y las peticiones RMI usan `Executors.newVirtualThreadPerTaskExecutor()`, logrando alto rendimiento sin un límite duro de *ThreadPools*.

### 🌟 3.2. Java RMI (Remote Method Invocation)
Sirve como vía de comunicación RPC (Remote Procedure Call) a nivel interno.
- **Justificación:** Otorga la capacidad de invocar métodos remotos (como `processTelemetry` o `executeTask(Task)`) en el clúster con serialización nativa de objetos complejos Java (como clases `Task`). El *overhead* de red es compensado al no requerir parseos de JSON/HTTP continuamente.
- **Resultado:** Las lógicas abstractas se pueden distribuir de forma nativa enviando *Bytecode*.

### 🌟 3.3. Protocolo Gossip P2P
Para tener un cluster *"master-less"* (sin un líder ni servidor centralizado).
- **Justificación:** Un servidor central o servicio estilo ZooKeeper añade complejidad y un punto único de fallo. *Gossip* emula el comportamiento de un virus o "chisme": cada nodo le cuenta a otro a quién conoce, propagando la información de salud y topología gradualmente por la red.
- **Resultado:** Alta tolerancia a la partición y fallos en hardware comercial estándar. O(N²) de coste pasivo pero inmensa robustez.

### 🌟 3.4. Apache Kafka
El bróker de mensajería distribuido.
- **Justificación:** Si los agentes de Go enviasen los datos en vivo directo a los nodos, la caída de estos haría perder métricas, y un aluvión de telemetría haría colapsar la capa de red con denegación de servicio (Backpressure problems). Kafka introduce **desacoplamiento** y actúa de "amortiguador" (*buffer*) y log distribuido.
- **Resultado:** Si el cluster RMI de Java se apaga o sufre, Kafka retiene ordenadamente los mensajes hasta que vuelva, permitiendo además el re-procesamiento si fuera necesario.

### 🌟 3.5. Golang (Agentes de Extracción)
El `AgenteGo` se encarga de extraer la métrica e iniciar el ciclo vital de los datos.
- **Justificación:** Go se compila como un binario estático, sin requerir una JVM de 200MB en las máquinas de donde obtiene los datos. Es altamente concurrente y consume ~15MB-30MB de memoria en ejecución. Ideal para *sidecars* y sistemas embebidos de monitorización.

### 🌟 3.6. Apache Avro + Schema Registry
Para la codificación del mensaje publicado en Kafka.
- **Justificación:** Frente a JSON que necesita descifrar strings, Avro comprime los datos de forma binaria apoyado en un *schema* fijo, reduciendo drásticamente (hasta en un 70%) el tamaño de banda ocupada en red y acelerando la de-serialización.
- **Gobierno del esquema:** un **Schema Registry** (Confluent en local; compatible con Apicurio) centraliza la definición del esquema (`schemas/telemetry.avsc`). NiFi serializa con él al publicar y el cliente Java deserializa con `KafkaAvroDeserializer`, garantizando compatibilidad y evolución controlada del contrato de datos.

### 🌟 3.7. Apache NiFi (Gateway de ingesta con verificación de licencia)
Pasarela que media entre los agentes Go y Kafka.
- **Justificación:** desacopla a los agentes del broker (no manejan credenciales ni topología de Kafka), centraliza la **autenticación por licencia** contra MySQL con revocación inmediata (`activa = 0`) y aporta trazabilidad de la ingesta. Solo las licencias activas se publican en `telemetry`; el resto se rechaza con HTTP 401.
- **Resultado:** control de acceso por collector sin tocar el código de los agentes, a coste de un salto de red adicional. Documentado en `NIFI_GATEWAY.md`.

### 🌟 3.8. Apache Cassandra
Almacén de la serie temporal de telemetría.
- **Justificación:** Cassandra ofrece escritura rápida y escalabilidad horizontal lineal para series temporales de alto volumen, ideal para el flujo continuo de mediciones. El keyspace `webhardmon` modela `mediciones` (particionada por `empresa_id` y ordenada por `ts DESC`), junto con `ordenadores` y `empresas`.
- **Justificación de la doble BD:** MySQL conserva el modelo relacional de la aplicación (empresa, administrador, usuario, licencia) y la autenticación de agentes; Cassandra absorbe la carga de escritura de telemetría sin penalizar la BD relacional.

### 🌟 3.7. TLS/SSL para Cifrado
Para la comunicación en el interior del cluster.
- **Justificación:** RMI en crudo carece de seguridad y transita en texto o bytes predecibles por la red (vulnerable a *man-in-the-middle* o ejecución de comandos remota maliciosa). Inyectando `-Djavax.net.ssl.trustStore` y fábricas de SSL personalizadas, el cluster RMI pasa a ser encriptado, pudiendo interconectar zonas geográficas diferentes con seguridad.

## 4. 🔀 Flujo Completo y Ciclo de Vida de los Datos

Para empaquetar cómo coopera todo, este es el viaje de 1 milisegundo de tu aplicación:

1. **[GO]** Un sensor en el Agente de Go detecta que la CPU local está al 90%. Empaqueta esta información.
2. **[GO -> NIFI]** Go envía la métrica por HTTP POST al gateway de NiFi, incluyendo las cabeceras de licencia (`X-License-Code`, `X-Portatil`).
3. **[NIFI]** NiFi verifica la licencia contra MySQL (`licencia.activa = 1`). Si es inválida, responde **HTTP 401** y descarta el dato. Si es válida, serializa a **Avro** (gobernado por Schema Registry) y publica en el topic `telemetry` de Kafka (HTTP 200 al agente).
4. **[BROKER]** Kafka almacena el paquete y se asegura de que exista persistencia y replicación.
5. **[JAVA CLIENT]** El `rmi-client` ("el consumidor"), mediante un bucle de `poll`, recibe el registro Avro y lo deserializa con `KafkaAvroDeserializer` (resolviendo el esquema vía Schema Registry).
6. **[JAVA CLIENT -> LOAD BALANCER]** El `Client` verifica su caché Gossip. Descubre que hay 3 nodos vivos. El puntero *round-robin* selecciona el `NODO 2` y despacha el cálculo en un Virtual Thread.
7. **[JAVA RMI (TLS)]** El Virtual Thread invoca remotamente el cálculo del `StressScore` (mediante `StressTask`) sobre el `NODO 2`. El flujo viaja por red con encriptación TLS.
8. **[JAVA NODE]** El `NODO 2` (Motor de Cálculo) ejecuta `StressTask.execute()` en un *Virtual Thread* y devuelve el StressScore.
9. **[CASSANDRA]** El cliente persiste la medición enriquecida (métricas + StressScore) en `webhardmon.mediciones`.
10. **[ACK]** Solo tras procesar y persistir el lote, el cliente confirma el *offset* con `commitSync` (**ack manual**, `enable.auto.commit=false`). Un mensaje no procesable se aparca en la **dead-letter** `telemetry.DLT` sin bloquear el flujo, garantizando *at-least-once*.


## 5. 🚀 Resiliencia (Casos Extremos)

- **Un Nodo de procesado se quema/cae:** Los demás dejarán de recibir pings. Tras 3-5 iteraciones, el nodo se elimina del Directorio Global P2P. El Cliente al fallar su intento inicial, lanza un *Failover* automático e intenta el siguiente nodo transparente. Ningún dato de Kafka se pierde.
- **Go genera 100 veces más tráfico del habitual:** Kafka se encargará del encolamiento y almacenamiento. El cluster procesará tan rápido como pueda.
- **Se incorporan más Nodos:** Simplemente arrancan un nuevo proceso instanciado apontando a la capa de Semillas (*Seeds*). En un par de *pings* el cluster entero conoce los nuevos recursos computacionales disponibles de forma orgánica.
- **El consumidor falla al procesar/persistir un mensaje:** gracias al **ack manual**, el *offset* solo se confirma tras procesar el lote, de modo que un fallo provoca el reprocesamiento (semántica *at-least-once*) y ningún mensaje se pierde. Un mensaje irrecuperable (p.ej. corrupto) se desvía a la **dead-letter** `telemetry.DLT` con cabeceras de diagnóstico, sin bloquear el resto del flujo.
- **Un collector con licencia revocada o falsa intenta inyectar datos:** NiFi lo rechaza en el gateway con **HTTP 401** verificando `licencia.activa` contra MySQL, antes de tocar Kafka. La revocación (`activa = 0`) surte efecto en el siguiente envío sin reiniciar nada.

## 6. 📈 Evaluación Cuantitativa del Rendimiento y Escalabilidad

Para validar científicamente las decisiones de diseño adoptadas, se ha implementado un componente de benchmark (`cluster.Benchmark`) en el submódulo del Cliente para evaluar tanto la concurrencia a nivel de nodo individual como la escalabilidad horizontal en un entorno distribuido de nodos variables.

### 6.1. Pruebas de Concurrencia de un Nodo
Se ejecutó un lote estresante de **500 tareas simultáneas** simulando el cálculo de la métrica **Stress Score** junto con operaciones bloqueantes de red o almacenamiento (esperas de 15ms) bajo tres estrategias de concurrencia:

1. **Secuencial (Bloqueante)**: 
   - **Tiempo total**: **10.294 ms**
   - **Rendimiento**: **48,6 tareas/seg**
   - **Limitación**: El hilo principal se bloquea durante la espera de red/disco de cada tarea, forzando un procesamiento puramente secuencial.
2. **Hilos de Plataforma (Pool Fijo de 20)**:
   - **Tiempo total**: **731 ms (Speedup: 14,08x)**
   - **Rendimiento**: **684,0 tareas/seg**
   - **Limitación**: Mejora sustancial al procesar hasta 20 tareas en paralelo, pero genera cola de espera en el pool al haber más tareas concurrentes (500) que hilos de CPU asignados. Aumentar el pool a 500 hilos dispararía el consumo de memoria JVM (~1MB por pila de hilo).
3. **Hilos Virtuales (Project Loom - Java 21)**:
   - **Tiempo total**: **150 ms (Speedup: 68,63x)**
   - **Rendimiento**: **3.333,3 tareas/seg**
   - **Ventaja**: Los hilos virtuales se suspenden y reanudan de forma transparente sin bloquear el hilo físico del sistema operativo cuando esperan I/O. Esto maximiza la eficiencia de CPU y permite que miles de tareas concurrentes se resuelvan casi instantáneamente con un único hilo portador de OS activo.

#### 🧪 Cómo y qué se ha probado en Concurrencia (Detalle de la prueba):
- **Clase de ejecución**: [`Benchmark.java`](file:///c:/Users/aimar/Downloads/files/client/src/main/java/cluster/Benchmark.java) en el submódulo `client` (método `runLocalBenchmark()`).
- **Lógica interna de simulación (Modelo a Trozos / Piecewise)**:
  - Cada una de las 500 tareas simula el procesamiento de una ventana temporal de **1.000 muestras de telemetría** generadas con ruido gaussiano (fluctuaciones realistas de CPU, RAM, Disco y Temperatura).
  - Para cada muestra calcula el **Stress Score** aplicando el **Modelo a Trozos**: media ponderada `(0.35·CPU + 0.30·Temp + 0.20·RAM + 0.15·Disco)` con **Hard Override** cuando `max(CPU, Temp) ≥ 90%`, siguiendo la metodología USE de Brendan Gregg.
  - Aplica suavizado **EWMA** (Exponential Weighted Moving Average, α=0.3) sobre la serie temporal de scores.
  - Calcula estadísticas (media, desviación típica) y percentiles **P95/P99** mediante ordenación `Arrays.sort()` (complejidad O(n log n)).
  - Finalmente ejecuta `Thread.sleep(15)` simulando la persistencia del resultado en BD (operación de E/S bloqueante de 15ms).
- **Proceso de ejecución**:
  1. Compila el proyecto completo desde el directorio raíz:
     ```bash
     mvn clean package -DskipTests
     ```
  2. Ejecuta el benchmark de concurrencia local (sin argumentos):
     ```bash
     java -cp client/target/client-1.0-SNAPSHOT.jar cluster.Benchmark
     ```
  3. El programa ejecuta secuencialmente las 500 tareas (acumulando el tiempo de bloqueo en un único hilo), luego las distribuye en un `ThreadPoolExecutor` fijo de 20 hilos de plataforma tradicionales, y finalmente usa `Executors.newVirtualThreadPerTaskExecutor()` para lanzarlas concurrentemente mediante hilos virtuales. Al finalizar, vuelca en la consola una tabla comparativa con los tiempos y tasas de rendimiento obtenidos.

### 6.2. Escalabilidad del Clúster con Nodos Variables
Se evaluó el comportamiento global del sistema distribuyendo **150 tareas de alta computación en CPU y bloqueo I/O** por Round-Robin hacia un número incremental de nodos activos:

- **1 Nodo Activo**: **138,89 tareas/seg** (Tiempo: 1.080 ms)
- **2 Nodos Activos**: **261,78 tareas/seg** (Tiempo: 573 ms)
- **3 Nodos Activos**: **537,63 tareas/seg** (Tiempo: 279 ms)

#### Análisis de Escalabilidad:
1. **Desacoplamiento y Carga Lineal**: El balanceador del Cliente reparte la carga de trabajo de forma dinámica usando Round-Robin. 
2. **Escalabilidad Horizontal Real**: Ejecutar múltiples nodos de cálculo en la misma máquina física para este benchmark local comparte los cores reales de CPU y el ancho de banda del bucle local de red (localhost), limitando el factor de aceleración máximo. Sin embargo, en un entorno de red distribuido real con máquinas físicas dedicadas por nodo, la adición de nodos incrementa linealmente la capacidad del clúster de forma proporcional al número de CPUs reales.
3. **Diseño Modulado sin Coordinador Central**: La arquitectura Gossip permite expandir la potencia del clúster de forma caliente (on-the-fly) sin cuellos de botella de sincronización centralizada.

- **Clases de ejecución**: [`Benchmark.java`](file:///c:/Users/aimar/Downloads/files/client/src/main/java/cluster/Benchmark.java) (método `runClusterBenchmark()`) enviando instancias de la clase serializable [`BenchmarkTask.java`](file:///c:/Users/aimar/Downloads/files/common/src/main/java/cluster/BenchmarkTask.java) al clúster de servidores [`ClusterNode.java`](file:///c:/Users/aimar/Downloads/files/server/src/main/java/cluster/ClusterNode.java).
- **Lógica interna de simulación (`BenchmarkTask`) — Pipeline completo**:
  - Cada una de las 150 tareas distribuidas ejecuta el pipeline de análisis de telemetría sobre una ventana de **5.000 muestras** generadas con distribución gaussiana sobre las métricas base.
  - Calcula el **Stress Score** para cada muestra usando el **Modelo a Trozos** (media ponderada + Hard Override al 90%), aplica suavizado **EWMA** (α=0.3), obtiene estadísticas descriptivas y percentiles **P95/P99** mediante ordenación.
  - Realiza **detección de anomalías por Z-Score** (umbral > 2σ) y calcula un score final compuesto ponderando los estadísticos con un factor multiplicativo por anomalías detectadas.
  - Luego, ejecuta un bloqueo `Thread.sleep(40)` (40ms) que emula la latencia de almacenamiento distribuido e I/O de red.
- **Proceso de ejecución**:
  1. Asegúrate de tener Kafka iniciado (`docker compose up -d kafka`).
  2. Levanta entre 1 y 3 nodos de cálculo en terminales independientes:
     - **Terminal del Nodo 1**:
       ```bash
       java -cp server/target/server-1.0-SNAPSHOT.jar cluster.ClusterNode node-1 localhost 6100 localhost:6100 localhost:6101 localhost:6102
       ```
     - **Terminal del Nodo 2**:
       ```bash
       java -cp server/target/server-1.0-SNAPSHOT.jar cluster.ClusterNode node-2 localhost 6101 localhost:6100 localhost:6101 localhost:6102
       ```
     - **Terminal del Nodo 3**:
       ```bash
       java -cp server/target/server-1.0-SNAPSHOT.jar cluster.ClusterNode node-3 localhost 6102 localhost:6100 localhost:6101 localhost:6102
       ```
  3. Ejecuta la herramienta de benchmark pasándole el parámetro `cluster` y la lista de direcciones de los nodos activos que deseas evaluar:
     - **Para probar con 1 Nodo activo**:
       ```bash
       java -cp client/target/client-1.0-SNAPSHOT.jar cluster.Benchmark cluster localhost:6100
       ```
     - **Para probar con 2 Nodos activos**:
       ```bash
       java -cp client/target/client-1.0-SNAPSHOT.jar cluster.Benchmark cluster localhost:6100 localhost:6101
       ```
     - **Para probar con 3 Nodos activos**:
       ```bash
       java -cp client/target/client-1.0-SNAPSHOT.jar cluster.Benchmark cluster localhost:6100 localhost:6101 localhost:6102
       ```
  4. El programa despacha en paralelo las 150 tareas desde el cliente mediante un pool de hilos virtuales balanceándolas uniformemente en Round-Robin entre los stubs RMI disponibles. Mide el tiempo total en milisegundos que le toma procesar el lote completo bajo cada topología de clúster incremental y calcula el rendimiento (tareas/seg).

## 7. 📦 Despliegue y Operación

El sistema se empaqueta en contenedores y se despliega por **capas de Docker Compose**, lo que permite levantar solo el núcleo de procesamiento o el stack completo con ingesta.

### 7.1. Imágenes
| Imagen | Rol | Réplicas |
|---|---|---|
| `rmi-server` | Nodo del clúster RMI (calcula StressScore). Clúster P2P con gossip. | 3 (1 por VM) |
| `rmi-client` | Puente: consume Kafka (Avro/SR) → StressScore por RMI → escribe Cassandra. | 1 |

Se construyen desde `server/Dockerfile` y `client/Dockerfile` y se publican en **Harbor** (local) o **Artifact Registry** (GCP). Detalle del contrato de integración en `CONTAINER_CONTRACT.md`.

### 7.2. Compose por capas
- **`docker-compose.yml` (core):** Kafka + Schema Registry + Cassandra (con `cassandra-init` que carga `db/schema-cassandra.cql`) + 3 nodos `rmi-server` + `rmi-client`. Es un entorno end-to-end de procesamiento sin necesidad de la infra del equipo.
- **`docker-compose.ingest.yml` (overlay de ingesta):** añade **NiFi** + **MySQL** (inicializado con `db/init.sql`). Se fusiona con el core compartiendo red:
  ```bash
  docker compose -f docker-compose.yml -f docker-compose.ingest.yml up -d
  ```
- **`docker-compose.gcp.yml` (producción):** core de producción en GCP; admite el mismo overlay de ingesta con `-f`.

### 7.3. Nube y orquestación
- **GCP turnkey:** `deploy-gcp.sh` automatiza el despliegue en Google Cloud (ver `DEPLOY_GCP.md`).
- **Kubernetes:** `k8s-deployment.yaml` describe el despliegue en clúster K8s.
- **Infraestructura del equipo:** repositorio OpenTofu **`webhardmon-infra`** que provisiona **3 nubes** (Proxmox local + GCP-A + GCP-B) interconectadas por una malla **WireGuard**, con **Cloudflare Tunnel** para exposición y registries **Harbor** + **Artifact Registry**.
  > ⚠️ **RMI sobre WireGuard:** los `HOST`/`SEEDS`/`java.rmi.server.hostname` deben ser nombres/IPs del *WireGuard*, no de Docker, o los stubs RMI apuntarán a direcciones inalcanzables entre VMs.

### 7.4. Integración Continua (CI)
- **SonarCloud:** `.github/workflows/sonar.yml` analiza el monorepo multi-lenguaje (**Java 21** de los 3 módulos Maven + **Go** del agente). Configuración en `sonar-project.properties`.

### Endpoint.java
```
Propósito: Ser el "DNI" de un nodo
Ejemplo:  node-1@localhost:6100
Usa:      Serializable (viaja por RMI)

Propósito: Definir QUYÉ operaciones hacen los nodos
Tipo:     Interface + Remote
Métodos:  getNodeId(), ping(), processTelemetry(), gossip()
Usa:      Implementada por ClusterNode

### ClusterNode.java

Propósito: SER un nodo del cluster
Tipo:     Servidor RMI

  1. processTelemetry(payload) = calcula StressScore

  3. ping() = liveness check

### Client.java

Propósito: Consumir Kafka y usar el cluster para calcular StressScore
Tipo:     KafkaConsumer (KafkaAvroDeserializer) + Cliente RMI
Ejecuta:
  1. Bootstrap RMI desde semillas
  2. Consume topic "telemetry" con ACK MANUAL

  3. Cache + round-robin + failover automático
  4. processTelemetry() por RMI y persiste en Cassandra

Arranca con: java -cp client/target/client-1.0-SNAPSHOT.jar cluster.Client <seed:port> [seed:port ...]
```

### Problema: "Port already in use"
```
Exception: java.rmi.server.ExportException: Port already in use: 6100

Solución:
1. Cambia el puerto en el comando:
   java -cp server/target/server-1.0-SNAPSHOT.jar cluster.ClusterNode node-new localhost 6103 ...
2. O mata el proceso anterior:
   pkill -f "cluster.ClusterNode"

### Problema: Cliente dice "Could not contact any seed"
```
Exception: Could not contact any seed or known member

Causas posibles:
❌ Ningún nodo está corriendo
❌ Tipeo mal la dirección (node-1 vs localhost)
❌ Firewall bloqueando puertos 6100-6102
❌ Nodos en máquinas distintas y no hay conectividad

Solución:
✓ Asegúrate que mínimo 1 nodo está running
✓ Verifica: netstat -an | grep 610
✓ Test: telnet localhost 6100
```

### Problema: Cliente se cuelga
```
-> dispatching to node: processTelemetry(payload)
(sin output por 60+ segundos)

Causa: Timeout de RMI (default ~30s)

Solución:
java -Dsun.rmi.transport.tcp.responseTimeout=5000 \
     cluster.Client localhost:6100
```

### Problema: Logs no aparecen
```
Solución: Asegúrate que usas System.out.println()
(Los System.err.println() van a stderr)

java -cp client/target/client-1.0-SNAPSHOT.jar cluster.Client localhost:6100 2>&1 | tee output.log

## 🎓 Vocabulario Clave

| Término | Significado | Ejemplo |
|---------|-------------|---------|
| **Bootstrap** | Arranque inicial (cliente obtiene lista de miembros) | Client llama gossip() a una semilla |
| **Gossip** | Protocolo de chismes (nodos intercambian membresía) | NODE-1 le dice a NODE-2: "conozco a NODE-3" |
| **Failover** | Cambio automático a alternativa | Cliente intenta NODE-2, falla, intenta NODE-3 |
| **Tombstone** | Marca de "nodo muerto" (temporal) | NODE-1 evicta NODE-2, lo marca muerto por 30s |
| **Anti-entropy** | Protocolo que reduce el desorden | Gossip hace que todos aprendan lo mismo |
| **Round-robin** | Alternancia circular | Llamada 1→NODE-1, 2→NODE-2, 3→NODE-3, 4→NODE-1 |
| **SPOF** | Single Point of Failure (punto único de fallo) | No hay SPOF aquí (sin servidor central) |
| **RMI** | Remote Method Invocation (llamadas remotas Java) | `stub.processTelemetry(payload)` es una llamada remota |
| **Registry** | Directorio de servicios RMI | Cada nodo crea su propio registry |
| **Kafka** | Bus de mensajería (topic "telemetry", 9092/9094) | Reemplaza al antiguo RabbitMQ |
| **ACK manual** | Confirmación explícita del consumidor | El client confirma sólo tras procesar el mensaje |
| **Dead-letter (DLT)** | Cola de mensajes fallidos | Lo no procesable va a "telemetry.DLT" |
| **Schema Registry** | Registro de esquemas Avro (8085) | NiFi/Kafka validan y (de)serializan con Avro |
| **Cassandra** | BD NoSQL de telemetría | Keyspace `webhardmon`, tabla `mediciones` |
| **NiFi** | Ingesta: valida licencia y publica a Kafka | Recibe del Agente Go en 8081 (UI en 8443) |

## 📈 Escalabilidad

### ¿Qué pasa si agregamos 100 nodos?

| Aspecto | Impacto |
|---------|---------|
| Gossip load | Cada nodo itera 100 peers cada 3s (~33/s) → Escalable |
| Cliente discovery | Mismo (bootstrap desde 1 seed) |
| Memory (per node) | members = Map 100 * Endpoint → ~10KB → OK |
| Network (gossip) | 100 nodos * 100 gossips/3s ≈ 3300 RMI calls/s → Posible saturar red |
| Failover latency | Sin cambios (round-robin sigue igual) |

**Conclusión:** Escalable hasta ~50-100 nodos con gossip cada 3s. Para más, necesitas gossip probabílístico (no todos con todos).

# 🔐 Ejecutar Cluster RMI con TLS/SSL

Para asegurar la red RMI interna frente a ataques man-in-the-middle o inyección de tareas no autorizadas, el clúster puede configurarse para cifrar todo su tráfico por TLS/SSL de forma nativa.

## 📋 Configuración Paso a Paso

### Paso 1: Generar Certificados (Keystore)

Ejecuta el script incluido en el proyecto para generar el keystore auto-firmado:
* **En Windows**: `generate-certs.bat`
* **En Linux/Mac**: `./generate-certs.sh`

Este comando crea el almacén de claves `server.keystore` en el directorio de trabajo con la clave privada y el certificado público.

---

### Paso 2: Ejecutar Nodos CON TLS

Inyecta las propiedades de red TLS de la JVM al arrancar cada `ClusterNode`:

```bash
java -Djavax.net.ssl.keyStore=server.keystore \
     -Djavax.net.ssl.keyStorePassword=changeit \
     -cp server/target/server-1.0-SNAPSHOT.jar \
     cluster.ClusterNode node-1 localhost 6100 localhost:6100 localhost:6101 localhost:6102
```

---

### Paso 3: Ejecutar Cliente CON TLS

El cliente requiere confiar en el certificado del clúster (Truststore). Pásale los parámetros correspondientes:

```bash
java -Djavax.net.ssl.trustStore=server.keystore \
     -Djavax.net.ssl.trustStorePassword=changeit \
     -cp client/target/client-1.0-SNAPSHOT.jar \
     cluster.Client localhost:6100 localhost:6101 localhost:6102
```

---

## 🔑 Propiedades JVM Explicadas

| Propiedad JVM | Propósito |
|---------------|-----------|
| `-Djavax.net.ssl.keyStore` | Archivo con la clave privada y certificado del servidor RMI. |
| `-Djavax.net.ssl.keyStorePassword` | Contraseña del almacén de claves (por defecto: `changeit`). |
| `-Djavax.net.ssl.trustStore` | Archivo que contiene los certificados de los servidores en los que el cliente confía. |
| `-Djavax.net.ssl.trustStorePassword` | Contraseña del almacén de confianza. |
| `-Djavax.net.debug=ssl:handshake` | (Opcional) Habilita el modo debug para visualizar la traza completa del handshake TLS en consola. |

---

## 📊 Comparación: Con TLS vs Sin TLS

| Aspecto | Sin TLS | Con TLS |
|---------|---------|---------|
| **Seguridad** | 🔴 Tráfico en texto claro (Vulnerable) | 🟢 Cifrado asimétrico (Seguro) |
| **Rendimiento** | 🟢 Latencia base (~1-2ms por llamada RMI) | 🟡 ~5-10% de sobrecarga por Handshake TLS |
| **Complejidad** | 🟢 Ninguna | 🟡 Requiere gestión e instalación de Keystores |
| **Producción** | ❌ Desaconsejado | ✅ Altamente recomendado |
