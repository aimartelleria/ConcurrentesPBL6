# рҹҡҖ Subir el servicio a Cloud вҖ” paso a paso

Despliegue del contenedor Java (`rmi-server` Г—3 + `rmi-client`) en la infra del equipo
(3 nubes unidas por WireGuard). **Regla de oro:** la imagen se construye **una vez sin
direcciones**; las direcciones del WireGuard se inyectan **al desplegar** (pasos 4-5), nunca
se recompila para cambiar una direcciГіn. Los **puertos no cambian**, solo los **hosts**.

## Prerrequisitos
- Infra provisionada (`webhardmon-infra`): VMs + WireGuard + Kafka + Schema Registry +
  Cassandra + NiFi + tГәnel Cloudflare.
- Acceso al registry de contenedores (Harbor local / Artifact Registry en GCP).

## 1. (Antes) Construir y publicar las imГЎgenes
```bash
docker build -t <REGISTRY>/rmi-server:latest -f server/Dockerfile . && docker push <REGISTRY>/rmi-server:latest
docker build -t <REGISTRY>/rmi-client:latest -f client/Dockerfile . && docker push <REGISTRY>/rmi-client:latest
```
`<REGISTRY>` = Harbor (local) o `europe-southwest1-docker.pkg.dev/<PROJECT>/<REPO>` (GCP-A).

## 2. (Una vez) Crear el esquema en Cassandra
```bash
cqlsh <cassandra-wg> -f db/schema-cassandra.cql   # keyspace webhardmon (mediciones/ordenadores/empresas)
```

## 3. (Una vez) Registrar el esquema Avro
Registra `schemas/telemetry.avsc` en el Schema Registry para el subject `telemetry-value`
(o deja que NiFi lo registre al publicar el primer mensaje).

## 4. (DespuГ©s) Desplegar los 3 nodos `rmi-server`
Cada nodo en su VM, con **su nombre de WireGuard**:
```bash
docker run -d --name rmi-node-1 \
  -e NODE_ID=node-01 -e HOST=node-01 -e PORT=6100 \
  -e SEEDS="node-01:6100 node-02:6100 node-03:6100" \
  -e JVM_OPTS="-Djava.rmi.server.hostname=node-01" \
  -p 6100:6100 <REGISTRY>/rmi-server:latest
# Repetir en node-02 y node-03 cambiando NODE_ID/HOST/hostname (PORT=6100 en cada VM).
```
> вҡ пёҸ `java.rmi.server.hostname` DEBE ser el nombre WireGuard de esa VM, o los stubs RMI
> apuntarГЎn a direcciones inalcanzables entre nodos.

## 5. (DespuГ©s) Desplegar el `rmi-client`
Apuntando a Kafka / Schema Registry / Cassandra del compaГұero (WireGuard):
```bash
docker run -d --name rmi-client \
  -e KAFKA_BOOTSTRAP_SERVERS="<kafka-wg>:9092" \
  -e SCHEMA_REGISTRY_URL="http://<sr-wg>:8085" \
  -e CASSANDRA_CONTACT_POINTS="<cass-wg>:9042" \
  -e CASSANDRA_LOCAL_DC="<dc-real>" \
  -e CASSANDRA_KEYSPACE="webhardmon" \
  <REGISTRY>/rmi-client:latest \
  node-01:6100 node-02:6100 node-03:6100      # seeds RMI como argumentos
```
Plantilla completa de variables: **`.env.cloud.example`**.

## 6. Conectar los agentes Go
En cada PC de usuario (entran por el tГәnel Cloudflare, fuera del WireGuard):
```bash
./AgenteGo -mode=publisher -nifi-url="https://ingest.<zona>/telemetry" \
  -codigo="<licencia>" -portatil="<nombre-ordenador>"
```

## 7. Verificar
- Logs de `rmi-client`: `[OK] <equipo> stress=.. -> mediciones`.
- En Cassandra: `SELECT * FROM webhardmon.mediciones LIMIT 5;`
- Si el clГәster RMI cae, los mensajes van a `telemetry.DLT` (no se pierden; at-least-once).

> Si el despliegue lo hace Ansible, estos `docker run` equivalen a las tareas del
> playbook: lo esencial es inyectar **las mismas variables de entorno**.

# Java RMI Cluster (no single point of failure)

> [!TIP]
> **рҹҡҖ ВЎDOCUMENTACIГ“N CENTRALIZADA DISPONIBLE!**
> Hemos unificado todas las guГӯas, diagramas de arquitectura, referencias rГЎpidas y resultados en un panel web interactivo premium. Abre el archivo **[index.html](index.html)** en tu navegador para ver la documentaciГіn interactiva con buscador, modo oscuro/claro y copia rГЎpida de comandos.

A peer-to-peer RMI cluster. Every node runs its own RMI registry, members
discover and track each other via gossip, and clients bootstrap from a
list of seeds (any one alive is enough). Killing any subset short of
"all of them" leaves the rest functional.

## Files

```

  Endpoint.java         Serializable (host, port, nodeId); equality by host:port
  Task.java             Generic computing task interface for compute engine
  ComputeService.java   Remote interface: getNodeId, ping, executeTask, processTelemetry, gossip
  ClusterNode.java      Self-registering, gossip-driven peer (Virtual Threads)
  Client.java           Multi-seed bootstrap + round-robin + failover + Kafka consumer
```

## Design

**End-to-end telemetry pipeline.** A Go collector agent on each user machine
measures CPU/RAM/disk/temperature/battery and sends it via HTTP POST to an **Apache
NiFi** ingestion gateway with license headers (`X-License-Code`, `X-Portatil`)
вҖ” it no longer publishes to Kafka directly. NiFi validates the agent's license
against MySQL (must be active), enriches with `empresa_id`/`nombre`, serializes
to **Avro** using a **Schema Registry**, and routes valid records to **Kafka**
(topic `telemetry`) while rejecting invalid ones. The Java `rmi-client`
consumes from Kafka with a `KafkaAvroDeserializer`, computes each measurement's
StressScore on the RMI cluster, and persists to **Cassandra**:

```
Go agent --HTTP--> NiFi (license check, enrich, Avro) --> Kafka (Avro/Schema Registry)
        --> rmi-client (manual ack + DLT) --> RMI cluster (StressScore) --> Cassandra
```

The cluster computes `StressScore = 0.4*CPU + 0.4*RAM + 0.2*Disk (+20 if
temperature > 80)`, clamped to `[0, 100]`. Storage is split between Cassandra
(`mediciones`, `ordenadores`, `empresas`) and MySQL (application data:
`empresa`, `administrador`, `usuario`, `licencia`, plus agent auth by license).
The middleware is **Java RMI + Apache Kafka**.

**No shared infrastructure.** Each node calls `LocateRegistry.createRegistry(port)`
on its own port and binds itself locally as `"ComputeNode"`. There is no
shared registry, no leader, no coordinator. The only thing every actor
(node or client) needs is a list of *seed* addresses вҖ” at least one of
which is reachable at bootstrap time.

**Gossip-based membership.** Each node holds a map of known members keyed
by `host:port`. Every 3 seconds it iterates the map, attempts a `gossip`
RPC with each peer, and merges the returned view. The RPC carries the
caller's `self` plus its view of the membership.

**Failure detection.** Three consecutive failed gossip rounds against a
peer (вүҲ9 seconds of unreachability) eject the peer and record a 30-second
tombstone on its address, suppressing re-introduction via stale gossip
from third parties.

**First-hand proof of life beats tombstones.** When a peer directly
contacts us via gossip, its `self` parameter clears any tombstone we
hold on it. This is what makes restarts work: a node that comes back at
the same address rejoins immediately rather than waiting 30 seconds.
Second-hand "I heard X is alive" gossip still respects tombstones.

**Bootstrap.** If a node's member map ever drops to empty (lost partition,
fresh start, every peer evicted), it re-adds its seed list and retries.
A node can boot before any of its seeds are up вҖ” it'll keep trying.

**Client.** The client takes a seed list, attempts `gossip(null, {})`
against each in turn until one responds, caches the returned membership,
and round-robins. Per-call `RemoteException` falls through to the next
cached member; if every cached member fails, it refreshes from seeds
and retries once.

## What's *actually* SPoF-free here

| Failure                          | Result                                               |
|----------------------------------|------------------------------------------------------|
| Any one node dies                | Survivors evict, keep serving. Client fails over.    |
| Majority dies                    | The lone survivor still serves.                      |
| A killed node restarts           | Direct contact clears its tombstone, instant rejoin. |
| A seed in the client list is down| Client falls through to the next seed.               |
| Network partition                | Each side keeps operating on the members it can see. |

The only invariant you need is: **at boot time, at least one address
in each actor's seed list resolves to a live node.** That's "any-of-N",
not "this-specific-one", so list 3+ stable hosts and you're done.

## Build and run

```
mvn clean install
```

Three peer nodes, each pointing at the other two:

```
java -cp build cluster.ClusterNode node-A localhost 1099 localhost:1100 localhost:1101
java -cp build cluster.ClusterNode node-B localhost 1100 localhost:1099 localhost:1101
java -cp build cluster.ClusterNode node-C localhost 1101 localhost:1099 localhost:1100
```

Client with the same three as seeds:

```
java -cp build cluster.Client localhost:1099 localhost:1100 localhost:1101
```

Kill any combination of nodes mid-stream. Within ~9 seconds the survivors
log `Evicted (no response after 3 rounds): X` and drop the dead node.
The client keeps going against whoever's left, refreshing its view if
needed. Restart a node and it rejoins on first gossip; you'll see
`Tombstone cleared by direct contact: X` on the peer that admits it back.

## Real-world deployment notes

- **Pin RMI's stub hostname.** RMI embeds the server's hostname in the
  stub returned from a registry lookup. By default it uses
  `InetAddress.getLocalHost()`, which is often unreachable from other
  machines. Set `-Djava.rmi.server.hostname=<reachable-name-or-ip>` on
  every node.
- **Pin the export port for firewalls.** The constructor calls `super(0)`,
  which exports the remote object on an anonymous port. For firewalled
  networks, pass a fixed port to `super()` and open it.
- **Seed list lives in config, not in a registry.** Put 3+ seeds (or
  ideally a DNS A-record / SRV record returning multiple hosts) in your
  client config. The seed list is the only "I have to know something"
  step; everything after is discovered.
- **Wire encryption is supported.** We use JVM SSL properties (e.g. `-Djavax.net.ssl.trustStore`) for encryption across untrusted networks. Ver `RUN_WITH_TLS.md`.
- **Despliegue en cloud (GCP).** Todo el stack (Kafka + Client + 3 nodos) se sube con un solo comando: `cp .env.example .env` вҶ’ editar вҶ’ `./deploy-gcp.sh`. Ver `DEPLOY_GCP.md` para la guГӯa completa (GCE turnkey y GKE).
- **Local stack with docker compose.** The published images are `rmi-server`
  (the `ClusterNode` peers) and `rmi-client` (the Kafka consumer). The core
  stack вҖ” Kafka + Schema Registry + Cassandra + 3 RMI nodes + client вҖ” comes up
  with `docker compose up`; layer the ingestion overlay (Apache NiFi + MySQL) on
  top with `docker compose -f docker-compose.yml -f docker-compose.ingest.yml up`.

## Known limits

- **No indirect probing.** If node A can't reach node B but C can, A
  will still evict B. Real gossip protocols (SWIM) ask K third parties
  to probe before declaring dead. For a small LAN cluster this is
  usually fine; on a flaky network you'd want to add it.
- **Split-brain is silent.** If the cluster partitions, each side keeps
  serving on the assumption the other side is dead. For a stateless
  service like a Compute Engine, that's the right behaviour. For anything that
  mutates state, you need a consensus protocol (Raft, Paxos) on top.
- **`processTelemetry` consumes from Kafka.** Telemetry now flows over an
  Apache Kafka topic (`telemetry`) using Avro with a Schema Registry. The
  consumer uses **manual offset commit** (committed only after the batch is
  processed) plus a **dead-letter topic** (`telemetry.DLT`), giving
  at-least-once semantics. For each measurement the StressScore is computed on
  the RMI cluster (round-robin + failover) and persisted to Cassandra
  (keyspace `webhardmon`, table `mediciones`). Ensure Kafka, the Schema
  Registry and Cassandra are reachable.
- **O(NВІ) gossip.** Every node pings every other peer every round.
  Fine up to dozens of nodes; beyond that, sample a random K peers per
  round instead.

# рҹ–ҘпёҸ GuГӯa de Inicio del Servidor ClГәster (ClusterNode)

Esta guГӯa explica detalladamente cГіmo compilar, configurar e iniciar los nodos del clГәster de procesamiento distribuido (`ClusterNode`) en el proyecto, tanto en modo estГЎndar (sin TLS) como en modo seguro (con TLS/SSL).

---

## рҹ“Ӣ Requisitos Previos

Antes de arrancar los servidores, asegГәrate de tener instalado y configurado lo siguiente en tu sistema:
1. **Java JDK 21 o superior**: El clГәster utiliza **Virtual Threads** (hilos virtuales) introducidos de forma estable en Java 21 para lograr una concurrencia masiva y no bloqueante.
2. **Apache Maven**: Herramienta de compilaciГіn y gestiГіn de dependencias para proyectos Java.
3. **Kafka**: Debe estar ejecutГЎndose localmente (por ejemplo, en un contenedor Docker en el puerto `9092` / `9094`) para que la inyecciГіn de telemetrГӯa funcione correctamente a travГ©s del cliente.
   ```bash
   docker compose up -d kafka
   ```

---

## рҹӣ пёҸ Paso 1: CompilaciГіn del Proyecto

Antes de ejecutar los nodos, es necesario compilar todos los submГіdulos (`common`, `server`, `client`) con Maven para generar los archivos `.jar` empaquetados.

Ejecuta el siguiente comando desde la raГӯz del workspace:

```bash
mvn clean package -DskipTests
```

**Salida esperada:**
Esto compilarГЎ los mГіdulos y colocarГЎ los ejecutables en sus respectivas carpetas:
- El servidor compilado se ubicarГЎ en: `server/target/server-1.0-SNAPSHOT.jar`
- El cliente compilado se ubicarГЎ en: `client/target/client-1.0-SNAPSHOT.jar`

---

## рҹҸғ Paso 2: EjecuciГіn de Nodos (Sin TLS)

En el modo estГЎndar sin cifrado, los nodos se comunican en texto claro a travГ©s de la red RMI.

### Sintaxis del Comando:
```bash
java -cp server/target/server-1.0-SNAPSHOT.jar cluster.ClusterNode <nodeId> <host> <port> [seedHost:Port ...]
```

### ParГЎmetros Explicados:
1. `<nodeId>`: Nombre Гәnico que identifica al nodo en la red (ej. `node-1`).
2. `<host>`: DirecciГіn IP o hostname del servidor donde se ejecuta el nodo (usualmente `localhost` para pruebas locales).
3. `<port>`: Puerto en el que este nodo levantarГЎ su propio RMI Registry local (ej. `6100`).
4. `[seedHost:Port ...]`: Lista de direcciones "semilla" (nodos de bootstrap). El nodo intentarГЎ conectarse a estas direcciones para descubrir a los demГЎs miembros del clГәster a travГ©s del protocolo *Gossip*. Al menos una semilla debe ser accesible en el arranque.

### Ejemplo de Arranque de un ClГәster de 3 Nodos:

Abre tres terminales independientes y ejecuta en cada una de ellas lo siguiente:

* **Terminal 1 (Nodo 1 en puerto 6100):**
  ```bash
  java -cp server/target/server-1.0-SNAPSHOT.jar cluster.ClusterNode node-1 localhost 6100 localhost:6100 localhost:6101 localhost:6102
  ```

* **Terminal 2 (Nodo 2 en puerto 6101):**
  ```bash
  java -cp server/target/server-1.0-SNAPSHOT.jar cluster.ClusterNode node-2 localhost 6101 localhost:6100 localhost:6101 localhost:6102
  ```

* **Terminal 3 (Nodo 3 en puerto 6102):**
  ```bash
  java -cp server/target/server-1.0-SNAPSHOT.jar cluster.ClusterNode node-3 localhost 6102 localhost:6100 localhost:6101 localhost:6102
  ```

---

## рҹ”җ Paso 3: EjecuciГіn de Nodos (Con TLS/SSL)

Para entornos de producciГіn o redes inseguras, se recomienda cifrar todo el trГЎfico RMI y el intercambio Gossip mediante certificados TLS/SSL.

### рҹ”‘ A. Generar Certificados (Keystore)
Primero, debes generar el archivo de certificados `server.keystore`. Ejecuta el script automatizado provisto en la raГӯz del proyecto:

* **En Windows (CMD / PowerShell):**
  ```cmd
  generate-certs.bat
  ```
* **En Linux / Mac:**
  ```bash
  chmod +x generate-certs.sh
  ./generate-certs.sh
  ```

Esto crearГЎ un keystore auto-firmado llamado `server.keystore` con la contraseГұa predeterminada `changeit`.

### рҹҡҖ B. Iniciar los Nodos en Modo TLS
Para activar TLS en la JVM, se deben inyectar dos propiedades del sistema Java mediante la bandera `-D` antes del comando de ejecuciГіn:
- `javax.net.ssl.keyStore`: Ruta al almacГ©n de claves (keystore).
- `javax.net.ssl.keyStorePassword`: ContraseГұa del keystore (ej. `changeit`).

Abre tres terminales independientes y ejecuta lo siguiente:

* **Terminal 1 (Nodo 1 con TLS):**
  ```bash
  java -Djavax.net.ssl.keyStore=server.keystore -Djavax.net.ssl.keyStorePassword=changeit -cp server/target/server-1.0-SNAPSHOT.jar cluster.ClusterNode node-1 localhost 6100 localhost:6100 localhost:6101 localhost:6102
  ```

* **Terminal 2 (Nodo 2 con TLS):**
  ```bash
  java -Djavax.net.ssl.keyStore=server.keystore -Djavax.net.ssl.keyStorePassword=changeit -cp server/target/server-1.0-SNAPSHOT.jar cluster.ClusterNode node-2 localhost 6101 localhost:6100 localhost:6101 localhost:6102
  ```

* **Terminal 3 (Nodo 3 con TLS):**
  ```bash
  java -Djavax.net.ssl.keyStore=server.keystore -Djavax.net.ssl.keyStorePassword=changeit -cp server/target/server-1.0-SNAPSHOT.jar cluster.ClusterNode node-3 localhost 6102 localhost:6100 localhost:6101 localhost:6102
  ```

> [!IMPORTANT]
> **El Cliente RMI tambiГ©n debe usar TLS:**
> Si los nodos del servidor se arrancan con TLS, el cliente RMI (`Client`) fallarГЎ al conectarse a menos que se ejecute tambiГ©n configurando el truststore:
> ```bash
> java -Djavax.net.ssl.trustStore=server.keystore -Djavax.net.ssl.trustStorePassword=changeit -cp client/target/client-1.0-SNAPSHOT.jar cluster.Client localhost:6100 localhost:6101 localhost:6102
> ```

---

## рҹ”Қ ParГЎmetros Adicionales de la JVM

Al desplegar el servidor en red o depurar conexiones, te resultarГЎn de gran utilidad los siguientes parГЎmetros de ejecuciГіn de la JVM:

| Propiedad | Ejemplo / Valor | Utilidad / PropГіsito |
|---|---|---|
| `-Djava.rmi.server.hostname` | `-Djava.rmi.server.hostname=192.168.1.50` | Fuerza a RMI a exponer esta direcciГіn IP en el Stub en lugar de `localhost`. Imprescindible para comunicaciones entre mГәltiples mГЎquinas reales. |
| `-Djavax.net.debug` | `-Djavax.net.debug=ssl:handshake` | Muestra en consola la traza de depuraciГіn completa del handshake TLS/SSL en cada conexiГіn RMI. Гҡtil si las llamadas TLS fallan. |

---

## вҡ пёҸ SoluciГіn de Problemas del Servidor

### 1. Error: `java.rmi.server.ExportException: Port already in use: 6100`
* **Causa**: Ya hay una instancia de un nodo (u otro proceso) corriendo en ese puerto.
* **SoluciГіn**: Cierra los procesos Java huГ©rfanos que hayan quedado activos en segundo plano.
  * **En Windows (PowerShell)**: `Stop-Process -Name java -Force` o `taskkill /F /IM java.exe` en CMD.
  * **En Linux/Mac**: `pkill -f "ClusterNode"` o `killall java`.

### 2. Los nodos no se descubren entre sГӯ (Vista de miembros vacГӯa)
* **Causa**: El puerto Gossip no es accesible, o la primera semilla indicada no estГЎ corriendo todavГӯa.
* **SoluciГіn**: 
  - AsegГәrate de arrancar primero el nodo que actГәa como la semilla principal.
  - Verifica que los firewalls locales no bloqueen los puertos `6100`, `6101` y `6102`.
  - Si estГЎs en Docker, asegГәrate de que todos los contenedores pertenezcan a la misma red puente.

### 3. Error `javax.net.ssl.SSLException` o `SSLHandshakeException`
* **Causa**: El cliente y el servidor no coinciden en la configuraciГіn SSL, falta el keystore, o el password suministrado es incorrecto.
* **SoluciГіn**: Regenera el keystore con `generate-certs.bat` y asegГәrate de que tanto el comando del nodo como el del cliente apunten a la ruta exacta y usen el password correcto (`changeit`).

Este documento explica cГіmo funciona el flujo de datos entre el agente de monitoreo (Go), el gateway de ingesta (Apache NiFi), el bus de mensajerГӯa (Apache Kafka) y la malla de procesamiento distribuido (Java RMI), y detalla cГіmo interpretar los resultados obtenidos en las pruebas de ejecuciГіn y failover.

1. **Agente Go (collector)**: Inspecciona el sistema operativo usando `gopsutil` en intervalos regulares (CPU/RAM/Disco/Temperatura/BaterГӯa) y envГӯa cada lectura mediante **HTTP POST** al gateway de ingesta **Apache NiFi**, incluyendo cabeceras de licencia (`X-License-Code` = cГіdigo y `X-Portatil`). Ya no publica directamente en ningГәn broker.
2. **Apache NiFi (gateway de ingesta)**: Valida la licencia recibida contra **MySQL** (debe estar activa), enriquece el registro con `empresa_id` y `nombre`, serializa la mГ©trica a **Avro** apoyГЎndose en el **Schema Registry**, enruta los mensajes vГЎlidos al topic de **Kafka** y rechaza los invГЎlidos.
3. **Apache Kafka (topic `telemetry`)**: ActГәa como bus asГӯncrono entre la ingesta y el procesamiento. Los mensajes viajan en **Avro** con gobierno de esquema vГӯa **Schema Registry** (puerto 9092 interno / 9094 externo).
4. **Cliente Java (`rmi-client`)**: Un `KafkaConsumer` con `KafkaAvroDeserializer` consume el topic `telemetry`. Usa **ACK manual** (hace commit del offset tras procesar correctamente el lote) y una cola **dead-letter** (`telemetry.DLT`), garantizando semГЎntica *at-least-once*. ActГәa como puente ("bridge") despachando cada mГ©trica al cluster Java mediante llamadas **RMI**.
5. **Nodos del Cluster Java (`ClusterNode`)**:
   - Cada nodo hospeda su propio registro RMI de forma distribuida (P2P, sin un servidor central ni SPOF).
   - Utilizan un protocolo de **Gossip (chisme)** periГіdico en segundo plano para informarse mutuamente quГ© nodos estГЎn vivos o cuГЎles han caГӯdo (evicciГіn).
   - Al recibir el paquete Avro, calculan un **Stress Score** en paralelo mediante **Virtual Threads** (Java 21).
6. **Persistencia (Cassandra)**: Una vez calculado el Stress Score, el cliente **persiste la mediciГіn en Cassandra** (keyspace `webhardmon`, tabla `mediciones`), incluyendo el campo `bateria_percent` (`double` nullable, `null` en equipos sin baterГӯa) junto a CPU, RAM, disco y temperatura; la mediciГіn tambiГ©n se vuelca a **HDFS**. MySQL queda como base de datos de la aplicaciГіn (empresa, administrador, usuario, licencia) y soporte de autenticaciГіn por licencia.

---

## рҹӣ пёҸ Ajustes Realizados para la IntegraciГіn

1. **Ingesta vГӯa NiFi + Kafka**: El agente Go (`SubscriberKafka.go`) dejГі de publicar directamente en un broker y ahora envГӯa las mГ©tricas por **HTTP POST a Apache NiFi**, que valida la licencia, serializa a Avro con Schema Registry y enruta a **Kafka** (topic `telemetry`). El `Client.java` consume ese topic mediante un `KafkaConsumer`.
2. **Fiabilidad de la entrega**: El consumidor implementa **ACK manual** (commit tras procesar el lote) y **dead-letter** (`telemetry.DLT`), logrando entrega *at-least-once* y aislando los mensajes problemГЎticos.
3. **Gobierno del esquema**: El **Schema Registry** centraliza y versiona el esquema Avro compartido entre NiFi (productor) y el cliente Java (consumidor).
4. **Compatibilidad de CompilaciГіn**: Se redujo el requerimiento de versiГіn en `go.mod` (`go 1.22+`) y se ejecutГі `go mod tidy` para garantizar que compile sin errores en entornos estГЎndares.

## рҹҡҖ CГіmo iniciar el sistema en local

### 1. Levantar el stack con Docker Compose
El **core** del sistema (Kafka + Schema Registry + Cassandra + los 3 nodos RMI + el cliente) se levanta con un Гәnico comando:
```bash
docker compose up -d
```
Para aГұadir el **overlay de ingesta** (Apache NiFi + MySQL), combina ambos ficheros:
```bash
docker compose -f docker-compose.yml -f docker-compose.ingest.yml up -d
```
Con esto quedan operativos el bus de Kafka (topic `telemetry`), el Schema Registry, Cassandra (keyspace `webhardmon`), los nodos del clГәster RMI, el cliente consumidor y el gateway NiFi validando licencias contra MySQL.

### 2. (Opcional) Arrancar los Nodos Java manualmente
Si prefieres ejecutarlos fuera de contenedores, compila el proyecto Java:
```bash
mvn clean package
```
Inicia tres nodos en distintas terminales usando diferentes puertos RMI:
```bash
# Terminal 1 (Nodo 1)
java -cp "server/target/server-1.0-SNAPSHOT.jar" cluster.ClusterNode node-1 localhost 6100 localhost:6100 localhost:6101 localhost:6102

# Terminal 2 (Nodo 2)
java -cp "server/target/server-1.0-SNAPSHOT.jar" cluster.ClusterNode node-2 localhost 6101 localhost:6100 localhost:6101 localhost:6102

# Terminal 3 (Nodo 3)
java -cp "server/target/server-1.0-SNAPSHOT.jar" cluster.ClusterNode node-3 localhost 6102 localhost:6100 localhost:6101 localhost:6102
```
Y el cliente Java (consumidor de Kafka / puente RMI):
```bash
java -cp "client/target/client-1.0-SNAPSHOT.jar" cluster.Client localhost:6100 localhost:6101 localhost:6102
```

### 3. Ejecutar el Agente Go
El agente envГӯa las mГ©tricas al gateway NiFi (modo *publisher*), incluyendo el cГіdigo de licencia y el identificador del portГЎtil:
```bash
go run . -mode=publisher -nifi-url=http://localhost:8081/telemetry -codigo=TU_CODIGO_LICENCIA -portatil=PC-01
```
> El agente Go vive en su **propio repositorio** (no en este). Ejecuta el comando desde el directorio del agente (donde reside `SubscriberKafka.go`). Ajusta `-nifi-url` (puerto **8081**, ruta `/telemetry`), `-codigo` y `-portatil` a tu entorno.

### EnvГӯo de MГ©tricas Normales (Go)

### Procesamiento y Enriquecimiento (Java)
El nodo que recibe la llamada RMI ejecuta el pipeline ETL y visualiza la informaciГіn formateada:
```text
[node-2 | Thread: ] ETL Procesado.
  - CPU Model: 12th Gen Intel(R) Core(TM) i7-12650H (1,18%)
  - RAM Total: 7,61 GB (23,01%)
  - Disk Total: 1006,85 GB (9,89%)
  - Temp: N/A
  - BaterГӯa: 87,5%
  - Stress Score: 11,66 / 100
```
* **InterpretaciГіn**:
  - La llamada RMI funcionГі correctamente y deserializГі el registro Avro completo.
  - Las capacidades de memoria y disco se convirtieron de bytes a Gigabytes (GB) de forma legible para el operador (`7,61 GB` y `1006,85 GB`).
  - La temperatura se muestra como `N/A` porque el agente de Go se ejecuta dentro de un contenedor virtualizado (Docker Desktop en Windows) donde la interfaz tГ©rmica de Linux no estГЎ disponible.
  - La **baterГӯa** (`bateria_percent`, porcentaje 0-100) se recoge junto con CPU/RAM/disco/temperatura; aparece como `null` (mostrado `N/A`) en equipos sin baterГӯa (p. ej. sobremesas o servidores). En este ejemplo el portГЎtil reporta `87,5%`.
  - El **Stress Score** de `11,66 / 100` se calculГі usando la ponderaciГіn: `(1,18% * 0.4) + (23,01% * 0.4) + (9,89% * 0.2)`.

### Comportamiento ante CaГӯdas (Failover RMI)
Cuando apagamos `node-2` e iniciamos otro envГӯo desde el agente de Go, el cliente Java muestra:
```text
[x] Received Avro Telemetry (38 bytes)
node-2@localhost:6101 failed (ConnectException), trying next...
-> dispatching telemetry to node-1@localhost:6100
```
Y en los logs del cluster se reporta:
```text
Evicted (no response after 3 rounds): node-2@localhost:6101
[node-1] view: [node-3@localhost:6102]
```
  - **EvicciГіn**: Los nodos del cluster detectaron que `node-2` ya no responde a los pings de Gossip y lo eliminaron de la vista de miembros de forma descentralizada.
  - **Failover automГЎtico**: El Cliente Java detectГі la desconexiГіn del nodo asignado en su cola Round-Robin, reintentГі la peticiГіn con el siguiente nodo vivo (`node-1`) y procesГі el mensaje sin pГ©rdida de informaciГіn.

## рҹ“Ҳ Pruebas de Rendimiento y JustificaciГіn Cuantitativa

Para cumplir con los requisitos del proyecto, se ha desarrollado un banco de pruebas (`cluster.Benchmark`) que permite ejecutar y analizar comparativamente las estrategias de paralelizaciГіn a nivel de nodo y a nivel de clГәster.

### 1. Benchmark de Concurrencia (Nivel de Nodo)
Esta prueba evalГәa tres estrategias diferentes ejecutando **500 tareas simultГЎneas** que simulan el cГЎlculo del **Stress Score** y un pipeline ETL ligero, seguido de una espera bloqueante de I/O de 15ms (escrituras simuladas en disco/BD):

| Estrategia de Concurrencia | Tiempo Total (ms) | Rendimiento (tareas/seg) | Factor de AceleraciГіn (Speedup) | Hilos FГӯsicos de OS Activos |
| :--- | :---: | :---: | :---: | :---: |
| **Secuencial (Bloqueante)** | 10.294 ms | 48,6 tareas/seg | 1,00x (Base) | 1 |
| **Hilos de Plataforma (Pool=20)** | 731 ms | 684,0 tareas/seg | 14,08x | 20 (fijo) |
| **Hilos Virtuales (Java 21 Loom)** | **150 ms** | **3.333,3 tareas/seg** | **68,63x** | **1** (Portador) |

#### рҹ§  JustificaciГіn Cuantitativa de Hilos Virtuales:
- **EvitaciГіn del Bloqueo**: Con Hilos Virtuales, cuando la tarea se bloquea en la llamada de I/O (`Thread.sleep(15)`), el hilo virtual se "desmonta" del hilo portador fГӯsico del sistema operativo, permitiendo que otro hilo virtual use ese procesador. Esto elimina la penalizaciГіn por cambio de contexto y el bloqueo fГӯsico de recursos.
- **Eficiencia en Recursos**: En lugar de requerir 500 hilos de plataforma (que consumirГӯan ~500MB de memoria en pilas de hilos), los hilos virtuales ocupan apenas unos pocos kilobytes cada uno en el heap, permitiendo concurrencia masiva con un consumo mГӯnimo de RAM y solo 1 hilo portador activo de OS.

---

### 2. Benchmark de Escalabilidad (Nivel de ClГәster de Nodos Variables)
Esta prueba distribuye **150 tareas del pipeline de Stress Score (Modelo a Trozos + EWMA + P95/P99 + Z-Score + I/O)** en Round-Robin a travГ©s de RMI hacia un nГәmero variable de nodos de cГЎlculo (`ClusterNode`) activos simultГЎneamente:

| ConfiguraciГіn del ClГәster | Tiempo Total (ms) | Rendimiento Global (tareas/seg) | Comportamiento frente a Carga |
| :--- | :---: | :---: | :--- |
| **1 Nodo Activo** | 1.080 ms | 138,89 tareas/seg | Cuello de botella fГӯsico (todo el procesamiento secuenciado en un Гәnico nodo) |
| **2 Nodos Activos** | 573 ms | 261,78 tareas/seg | DistribuciГіn activa de carga round-robin entre 2 nodos, mejorando el rendimiento |
| **3 Nodos Activos** | 279 ms | 537,63 tareas/seg | Rendimiento Гіptimo, minimizaciГіn de latencia y mГЎxima paralelizaciГіn de I/O |

#### рҹ§  JustificaciГіn del DiseГұo Escalable:
- **Balanceo Round-Robin**: Al distribuir tareas de manera uniforme mediante el RMI Client, evitamos que un solo nodo actГәe como cuello de botella.
- **Escalabilidad Horizontal**: Si bien en un benchmark local sobre una misma mГЎquina fГӯsica la aceleraciГіn se ve limitada por compartir la CPU y la interfaz de red *loopback* local, el diseГұo modular desacoplado del clГәster garantiza que al desplegar nodos en **mГЎquinas fГӯsicas diferentes**, la capacidad de cГіmputo del clГәster escale de forma lineal al aprovechar los cores y ancho de banda independientes de cada mГЎquina del nodo de cГЎlculo.
- **Descubrimiento DinГЎmico sin SPOF**: La adiciГіn o eliminaciГіn de nodos se propaga mediante Gossip de manera autГіnoma, permitiendo adaptar la topologГӯa segГәn la demanda de forma flexible y tolerante a fallos.

### рҹӣ пёҸ CГіmo y quГ© se ha probado en los Benchmarks (Detalle de las pruebas)

#### 1. Pruebas de Concurrencia de un Nodo (Local)
* **Clase de ejecuciГіn**: [`Benchmark.java`](file:///c:/Users/aimar/Downloads/files/client/src/main/java/cluster/Benchmark.java) en el submГіdulo `client` (mГ©todo `runLocalBenchmark()`).
* **LГіgica interna de simulaciГіn (Modelo a Trozos / Piecewise)**:
  * Cada una de las 500 tareas simula el procesamiento de una ventana temporal de **1.000 muestras de telemetrГӯa** generadas con ruido gaussiano (fluctuaciones realistas de CPU, RAM, Disco y Temperatura).
  * Para cada muestra calcula el **Stress Score** aplicando el **Modelo a Trozos**: media ponderada `(0.35В·CPU + 0.30В·Temp + 0.20В·RAM + 0.15В·Disco)` con **Hard Override** cuando `max(CPU, Temp) вүҘ 90%`, siguiendo la metodologГӯa USE de Brendan Gregg.
  * Aplica suavizado **EWMA** (Exponential Weighted Moving Average, Оұ=0.3) sobre la serie temporal de scores.
  * Calcula estadГӯsticas (media, desviaciГіn tГӯpica) y percentiles **P95/P99** mediante ordenaciГіn `Arrays.sort()` (complejidad O(n log n)).
  * Finalmente ejecuta `Thread.sleep(15)` simulando la persistencia del resultado en BD (operaciГіn de E/S bloqueante de 15ms).
* **Proceso de ejecuciГіn**:

#### 2. Pruebas de Escalabilidad del ClГәster (Red RMI)
* **Clases de ejecuciГіn**: [`Benchmark.java`](file:///c:/Users/aimar/Downloads/files/client/src/main/java/cluster/Benchmark.java) (mГ©todo `runClusterBenchmark()`), la tarea serializable [`BenchmarkTask.java`](file:///c:/Users/aimar/Downloads/files/common/src/main/java/cluster/BenchmarkTask.java) y el clГәster de servidores [`ClusterNode.java`](file:///c:/Users/aimar/Downloads/files/server/src/main/java/cluster/ClusterNode.java).
* **LГіgica interna de simulaciГіn (`BenchmarkTask`) вҖ” Pipeline completo**:

# рҹ”„ Arquitectura вҖ” Flujo por Nube

> **Fuente de verdad del contrato de datos = el bridge Java (`client/Client.java`).** NiFi lo
> maneja nuestro equipo, asГӯ que emite el Avro con los nombres que el bridge lee. El `stressScore`
> **NO** viaja en el payload: lo calcula el clГәster RMI y lo aГұade el bridge.

## Vista de alto nivel

```mermaid
flowchart LR
    AG["Agente Go<br/>CPUВ·RAMВ·discoВ·tempВ·bateria"]
    subgraph LOCAL["Nube local (Proxmox)"]
        NIFI["NiFi gateway<br/>valida licencia + empresa_id"]
        MYSQL[("MySQL<br/>telemetriadb")]
        HDFS[("HDFS Parquet<br/>/data/telemetry")]
        REGL["Docker Registry (Harbor)"]
    end
    subgraph GCPA["GCP-A вҖ” Streaming"]
        KAFKA["Kafka<br/>topic telemetry"]
        SR["Schema Registry"]
        BRIDGE["Bridge<br/>Client.java"]
        RMI["Cluster RMI 2-3 nodos<br/>StressScore"]
        CASS[("Cassandra<br/>webhardmon.mediciones")]
        REGA["Docker Registry"]
    end
    subgraph GCPB["GCP-B вҖ” Analitica / Servicio"]
        WEB["Panel web<br/>Spring Boot"]
        GRAF["Grafana"]
        REGB["Docker Registry"]
    end
    AG -->|"JSON + X-License-Code<br/>Cloudflare Tunnel"| NIFI
    NIFI -->|"lookup licencia"| MYSQL
    NIFI -->|"Avro"| KAFKA
    KAFKA -.-> SR
    SR -.-> BRIDGE
    KAFKA -->|"consume Avro"| BRIDGE
    BRIDGE -->|"StressTask RMI"| RMI
    RMI -->|"stressScore"| BRIDGE
    BRIDGE -->|"hot"| CASS
    BRIDGE -->|"batch Parquet"| HDFS
    WEB --> MYSQL
    WEB --> CASS
    WEB --> GRAF
```

## Flujo paso a paso

1. **Agente Go** (en cada PC) recoge CPU/RAM/disco/temperatura/**baterГӯa** y envГӯa **JSON** a NiFi con cabeceras `X-License-Code` / `X-Portatil`. Entra por **Cloudflare Tunnel** (no por WireGuard).
2. **NiFi (gateway)** valida la licencia contra **MySQL** (vista `licencia_lookup`) y enriquece `empresa_id` + `nombre`. Serializa a **Avro** (Schema Registry) y publica en Kafka topic `telemetry`. *El payload NO lleva `stressScore`.*
3. **Bridge (`client/Client.java`)** consume de Kafka (Avro vГӯa SR, Virtual Threads):
   - llama al **clГәster RMI** con `StressTask` (round-robin + failover) вҶ’ obtiene `stressScore`.
   - escribe en **Cassandra** `webhardmon.mediciones` (hot path).
   - escribe **Parquet en HDFS** `/data/telemetry` (batch, best-effort).
   - **ack manual** + **dead-letter** `telemetry.DLT` вҶ’ *at-least-once*.
4. **ClГәster RMI** calcula `StressScore = 0.4В·CPU + 0.4В·RAM + 0.2В·Disco (+20 si TВӘ>80 ВәC)`, acotado [0,100].
5. **Panel web** (Spring Boot, GCP-B) lee MySQL + Cassandra + Grafana.

3 nubes (Proxmox local В· GCP-A streaming В· GCP-B analГӯtica) unidas por **WireGuard**.

## QuiГ©n calcula / escribe quГ©

| AcciГіn | Componente | Nota |
|---|---|---|
| Validar licencia + enriquecer `empresa_id`/`nombre` | **NiFi** | contra MySQL, antes de Kafka |
| Serializar a Avro y publicar | **NiFi** | topic `telemetry` |
| Calcular `stressScore` | **ClГәster RMI** | disparado por el bridge, **despuГ©s** de Kafka |
| Escribir Cassandra (hot) | **Bridge** | tras el RMI |
| Escribir HDFS Parquet (batch) | **Bridge** | tras el RMI вҖ” **NiFi NO escribe Parquet** |

## DistribuciГіn por nube

| Nube | Componentes |
|---|---|
| **Local (Proxmox)** | NiFi, MySQL, **HDFS**, Harbor (registry) |
| **GCP-A (Streaming)** | Kafka, Schema Registry, Bridge, RMI, **Cassandra**, registry |
| **GCP-B (AnalГӯtica)** | Panel web, Grafana, registry |

Cada nube tiene su **propio Docker Registry** (Harbor local + uno en GCP-A + otro en GCP-B). Las imГЎgenes se construyen con `docker/build-and-push.sh`: `stressscore`/`stressscore-bridge` вҶ’ GCP-A, `web` вҶ’ GCP-B.

## Contrato Avro (gobernado por `client`)

El esquema (`schemas/telemetry.avsc`) emite los nombres que el bridge lee: `empresa_id`, `nombre`, `ts`(ms), `cpu_percent`, `ram_percent`, `disco_percent`, `temperatura?`, `bateria_percent?`, `ram`(texto), `almacenamiento`(texto), `procesador?`. El `stressScore` lo aГұade el bridge tras el RMI; **no es un campo de ingesta**.

# рҹ“Ҡ Proyecto: Cluster RMI sin Punto Гҡnico de Fallo

## рҹҺҜ ВҝQuГ© es este proyecto?

Es un **sistema de cluster distribuido** hecho en Java RMI donde mГәltiples nodos pueden comunicarse entre sГӯ de forma peer-to-peer (de igual a igual) **sin necesidad de un servidor central**. El cliente puede conectarse a cualquier nodo, y si falla uno, automГЎticamente se conecta a otro.

Es como una red de computadoras donde cada una es independiente, pero todas se conocen entre sГӯ y trabajan juntas.

### CaracterГӯsticas clave:

1. **Sin punto Гәnico de fallo**: No hay servidor central. Cada nodo es independiente.
2. **RMI (Java Remote Method Invocation)**: ComunicaciГіn remota entre mГЎquinas Java.
3. **Descubrimiento automГЎtico**: Los nodos se conocen entre sГӯ mediante gossip (chismes).
4. **Resiliencia**: Si un nodo cae, los demГЎs siguen funcionando.
5. **Bootstrap desde semillas**: El cliente solo necesita saber la direcciГіn de al menos un nodo para empezar.

### Componentes del pipeline

1. **Agente Go (collector)**: mide CPU/RAM/disco/temperatura/baterГӯa (`bateria_percent`, 0-100, nullable: `null` en equipos sin baterГӯa). Ya **no** publica directo a Kafka: hace `HTTP POST` a un gateway Apache NiFi con cabeceras de licencia (`X-License-Code` = cГіdigo, `X-Portatil`).
2. **Apache NiFi (gateway de ingesta)**: valida la licencia del agente contra la BD de aplicaciГіn en **MySQL** (debe estar activa), serializa a **Avro** usando un **Schema Registry**, enruta los vГЎlidos a Kafka y rechaza los invГЎlidos. Enriquece con `empresa_id` y `nombre` (`nombre_ordenador`).
3. **Apache Kafka** (topic `telemetry`, 9092 interno / 9094 externo): bus asГӯncrono. Avro en el cable con **Schema Registry** (Confluent/Apicurio) como fuente Гәnica del esquema.
4. **Client Java (rmi-client)**: `KafkaConsumer` con `KafkaAvroDeserializer`. **ACK MANUAL** (commit del offset solo tras procesar el lote) + **DEAD-LETTER** (topic `telemetry.DLT`) вҮ’ entrega **at-least-once**. Calcula el StressScore en el cluster por RMI y **persiste en Cassandra** (keyspace `webhardmon`, tabla `mediciones`).
5. **Cluster RMI (rmi-server x3)**: P2P sin punto Гәnico de fallo, descubrimiento por gossip, **Virtual Threads (Java 21)**. Ejecuta `StressTask`.
6. **Almacenamiento**: **Cassandra** (`mediciones` = serie temporal con CPU/RAM/disco/temperatura/baterГӯa вҖ”`bateria_percent` (double, nullable)вҖ” replicada tambiГ©n en HDFS, `ordenadores` = inventario, `empresas`) y **MySQL** = BD de la aplicaciГіn (empresa, administrador, usuario, licencia) y autenticaciГіn de agentes por licencia.

### Middleware

- **Java RMI**: cГіmputo distribuido (cГЎlculo del StressScore en el cluster).
- **Apache Kafka**: mensajerГӯa asГӯncrona (topic `telemetry`, grupo `telemetry_java_consumers`).

> El proyecto **ya no usa RabbitMQ/AMQP**. Toda la mensajerГӯa pasa por Kafka.

### Fiabilidad y seguridad

- **TLS opcional** en RMI.
- **AutenticaciГіn de agentes por licencia** (`codigo`) verificada en NiFi contra MySQL.
- **Ack manual + dead-letter** en Kafka.
- **Failover** RMI (round-robin + reintentos).
- **Gobierno de esquema** con Schema Registry.

**ВҝQuГ© es el Gossip?**
Es como si los nodos chismearan entre sГӯ:
- "Hola, soy NODE-1 y conozco a NODE-2 y NODE-3"
- "OK, actualicГ© mi lista de miembros conocidos"
- Si no responde 3 veces вҶ’ Lo marcamos como muerto (tombstone)
- Si se reinicia вҶ’ El tombstone se borra automГЎticamente

**ВҝQuГ© es un Tombstone?**
Una marca que dice "este nodo estaba muerto". Evita que otros nodos sigan intentando conectar a una direcciГіn que ya no existe.

### 4. **Client.java** рҹ‘Ө
**ВҝQuГ© es?** El programa que USA el cluster. Es quien pide operaciones.

**Flujo de trabajo:**

```
1. Bootstrap
   в”ңв”Җ "Dame la lista de nodos conocidos"
   в””в”Җ Solo necesita 1 nodo respondiendo

2. Cache + Round-Robin
   в”ңв”Җ Guarda lista de miembros
   в”ңв”Җ Alterna entre ellos (NODE-1 вҶ’ NODE-2 вҶ’ NODE-3 вҶ’ NODE-1)
   в””в”Җ Esto balancea carga

3. Failover (si falla)
   в”ңв”Җ Intenta siguiente nodo
   в””в”Җ Si todos fallan вҶ’ Refresca lista y reintenta

4. Ejecuta tarea
   в””в”Җ processTelemetry(valor) en cualquier nodo disponible
```

**ВҝQuГ© simula el cliente?**
- Un puente (consumidor) que recibe datos desde Apache Kafka y los pasa al cluster.
- En el `main()` se conecta a Kafka (usando Virtual Threads) como `KafkaConsumer` con `KafkaAvroDeserializer` (Schema Registry), consumiendo del topic `telemetry` dentro del grupo `telemetry_java_consumers`.
- Por cada mensaje Avro recibido, calcula el StressScore por RMI (`processTelemetry(payload)` en un nodo del cluster) y persiste el resultado en Cassandra (keyspace `webhardmon`, tabla `mediciones`).
- GarantГӯa **at-least-once**: ACK MANUAL (commit del offset solo tras procesar el lote) + DEAD-LETTER (topic `telemetry.DLT`) para los mensajes que fallan.
- Simula: **Ingesta asГӯncrona, balanceo de carga, recuperaciГіn de fallos, y descubrimiento dinГЎmico**.

## рҹ“Ҡ Escenarios de Fallos y RecuperaciГіn

### Escenario 1: Un nodo se cae

```
Antes:  NODE-1 вң“  NODE-2 вң“  NODE-3 вң“
                    вҶ“ (cae)
DespuГ©s: NODE-1 вң“  NODE-2 вң—  NODE-3 вң“

Cliente:
- Intenta NODE-2: FALLA вқҢ
- AutomГЎticamente intenta NODE-3: OK вң“
- El cliente NO se da cuenta del fallo (transparente)
- Gossip marca NODE-2 con tombstone por 30s
```

### Escenario 2: ParticiГіn de red (cliente aislado)

```
Antes:  [CLIENT] вҶҗвҶ’ NODE-1 вң“
               вҶ“ (corte de red)
DespuГ©s: [CLIENT] вң— NODE-1 вң“

Cliente intenta processTelemetry():
- Intenta NODE-1: TIMEOUT вқҢ
- Refresca lista de miembros: FALLA (sin conexiГіn)
- Lanza excepciГіn: "All members failed even after a refresh"
- Al no hacer commit del offset (ACK MANUAL), Kafka re-entregarГЎ el mensaje (at-least-once)
```

### Escenario 3: Nodo se reinicia

```
NODE-1: MUERTO (tombstone 30s) вң“
           вҶ“ (se reinicia)
NODE-1: VIVO (en la misma direcciГіn IP:puerto)

Gossip recibe:
- contacto directo de NODE-1 вҶ’ Borra tombstone INMEDIATAMENTE
- NODE-1 se reГәne al cluster sin esperar 30s
```

## рҹҺ“ Preguntas Frecuentes

### P1: ВҝPor quГ© necesita "semillas" (seeds)?
**R:** El bootstrap es el problema. Cuando un cliente arranca, no conoce a ningГәn nodo.
Las semillas son direcciones conocidas del cluster que dice "prueba en estas direcciones".
Si al menos UNA responde, el cliente obtiene la lista completa de todos.

### P2: ВҝQuГ© es RMI?
**R:** Remote Method Invocation. Permite llamar mГ©todos en objetos de otras mГЎquinas Java como si estuvieran locales.
```java
// En mГЎquina remota
Registry reg = LocateRegistry.getRegistry("localhost", 6100);
ComputeService stub = (ComputeService) reg.lookup("ComputeNode");
stub.processTelemetry(payload);  // ВЎLlamada remota!
```

### P3: ВҝQuГ© pasa si TODOS los nodos se caen?
**R:** El cluster estГЎ muerto. El cliente lanzarГЎ excepciГіn.
Pero si se reinician, se recuperan automГЎticamente porque cada nodo re-aГұade sus semillas.

### P4: ВҝCГіmo detecta que un nodo estГЎ muerto?
**R:** Por timeout de RMI (3 fallos = ~9 segundos de silencio) + gossip periГіdico.
No es un heartbeat explГӯcito, sino por falta de respuesta en gossip.

### P5: ВҝPor quГ© se llama "anti-entropy" al gossip?
**R:** Porque el gossip reduce la entropГӯa (desorden) del sistema.
Todos los nodos gradualmente convergen a la misma vista de membresГӯa.

### P6: ВҝQuГ© es "round-robin"?
**R:** Una tГ©cnica de balanceo: el cliente alterna entre nodos en orden circular.
```
Llamada 1 вҶ’ NODE-1
Llamada 2 вҶ’ NODE-2
Llamada 3 вҶ’ NODE-3
Llamada 4 вҶ’ NODE-1 (vuelta al inicio)
```

### P7: ВҝPuede haber "split-brain" (dos clusters separados)?
**R:** SГҚ. Si la red se particiona, cada parte funciona independientemente.
Cuando se reconecta, habrГЎ un perГӯodo de convergencia. Este diseГұo NO resuelve split-brain.

### P8: ВҝPor quГ© los tombstones duran 30 segundos?
**R:** Balance entre:
- **Corto**: Rejoin rГЎpido si reinicia
- **Largo**: Evita re-introducir nodos muertos por un tiempo

## рҹ“Ҳ Ventajas y Limitaciones

### вң… Ventajas
- **Sin punto Гәnico de fallo** (SPOF)
- **Escalable**: Agregar nodos es trivial
- **Resiliente**: Aguanta caГӯdas parciales
- **Simple**: Gossip es elegante y probado (BitTorrent, Cassandra, etc.)

### вқҢ Limitaciones
- **Sin garantГӯas de consistencia** (eventual consistency)
- **No resuelve split-brain** (particiones de red)
- **RMI es lento** (Java puro, sin protobuf/gRPC)
- **EncriptaciГіn vГӯa TLS**: Implementada vГӯa properties JVM (ver `RUN_WITH_TLS.md`)
- **Gossip periГіdico**: DetecciГіn de fallos toma tiempo

## 1. рҹҺҜ VisiГіn General

El sistema es una **red distribuida de computaciГіn *Peer-to-Peer* (P2P) y procesamiento de telemetrГӯa sin Punto Гҡnico de Fallo (SPOF)**. Su propГіsito es recoger datos de hardware (telemetrГӯa), validarlos en una pasarela de ingesta, encolarlos para evitar pГ©rdida de datos en picos de carga, distribuirlos a un enjambre de nodos de computaciГіn que se autodescubren mediante un protocolo *Gossip* y persistir el resultado.

A nivel funcional, el sistema:
1. **Recopila** mГ©tricas en mГЎquinas externas (agentes Go).
2. **Valida y gobierna la ingesta** mediante un *gateway* Apache NiFi que autentica por licencia contra la BD de la aplicaciГіn (MySQL) y serializa a Avro con Schema Registry.
3. **Serializa y encola** de forma altamente eficiente en Apache Kafka.
4. **Distribuye** el cГЎlculo (StressScore) a travГ©s de una malla P2P de nodos Java vГӯa RMI.
5. **Persiste** las mediciones enriquecidas en Cassandra.
6. **Resiste** caГӯdas de nodos, redireccionando el trГЎfico automГЎticamente de manera distribuida, con *ack* manual y *dead-letter* en el consumidor para garantГӯa *at-least-once*.

### Componentes Clave:
1. **Source (Agente Go):** Obtiene datos del sistema operativo y genera cargas Гәtiles (*payloads*), que envГӯa por HTTP al gateway de ingesta. Recoge CPU, RAM, disco, temperatura y **baterГӯa** (`bateria_percent`, porcentaje 0-100, `double` *nullable*: `null` en equipos sin baterГӯa; vГӯa *sysfs* en Linux y WMI en Windows).
2. **Gateway de ingesta (Apache NiFi):** Se sitГәa entre los agentes y Kafka. Autentica a cada collector por su **licencia** contra la BD de la aplicaciГіn (MySQL: tabla `licencia`, `activa = 1`), serializa a Avro gobernado por Schema Registry y publica en Kafka. Las licencias inactivas o inexistentes se rechazan con **HTTP 401**. (Detalle completo en `NIFI_GATEWAY.md`.)
3. **Buffer (Kafka):** Desacopla la emisiГіn de datos de la capacidad y velocidad de procesamiento del cluster de Java. El topic `telemetry` transporta Avro con Schema Registry.
4. **Edge / Entrypoint (Cliente Java, `rmi-client`):** ActГәa como un puente. Consume de Kafka con `KafkaAvroDeserializer`, calcula el StressScore vГӯa RMI (balanceo Round-Robin tolerante a fallos) y persiste en Cassandra. Usa **ack manual** (`commitSync` con `enable.auto.commit=false`) y **dead-letter** (`telemetry.DLT`) para garantГӯa *at-least-once*.
5. **Compute Grid (Servidores ClusterNode, `rmi-server` x3):** Malla de nodos que ejecutan el motor de cГЎlculo genГ©rico (`Task`), en particular `StressTask`. Mantienen su estado (quiГ©n estГЎ vivo/muerto) "cotilleando" (Gossip) entre sГӯ.
6. **Almacenamiento:** **Cassandra** (keyspace `webhardmon`: tablas `mediciones`, `ordenadores`, `empresas`) para la serie temporal de telemetrГӯa, y **MySQL** como BD de la aplicaciГіn (empresa, administrador, usuario, licencia; autenticaciГіn de los agentes por licencia).

## 3. рҹ§  JustificaciГіn TecnolГіgica (Stack)

Cada tecnologГӯa en este ecosistema no fue elegida al azar, sino que resuelve un problema especГӯfico del procesamiento o la arquitectura en red.

### рҹҢҹ 3.1. Java 21 y Virtual Threads (Project Loom)
En la parte del procesamiento RMI (Motor de CГЎlculo) y el puente (Cliente), la concurrencia tradicional generarГӯa "cuellos de botella" graves: RMI bloquea los hilos durante la conexiГіn y espera.
- **JustificaciГіn:** Los *Virtual Threads* permiten instanciar millones de hilos superligeros que se "aparcan" gratis cuando esperan I/O (la red), evitando que el motor se sature.
- **Resultado:** En nuestra implementaciГіn, el procesamiento concurrente de telemetrГӯa de Kafka y las peticiones RMI usan `Executors.newVirtualThreadPerTaskExecutor()`, logrando alto rendimiento sin un lГӯmite duro de *ThreadPools*.

### рҹҢҹ 3.2. Java RMI (Remote Method Invocation)
Sirve como vГӯa de comunicaciГіn RPC (Remote Procedure Call) a nivel interno.
- **JustificaciГіn:** Otorga la capacidad de invocar mГ©todos remotos (como `processTelemetry` o `executeTask(Task)`) en el clГәster con serializaciГіn nativa de objetos complejos Java (como clases `Task`). El *overhead* de red es compensado al no requerir parseos de JSON/HTTP continuamente.
- **Resultado:** Las lГіgicas abstractas se pueden distribuir de forma nativa enviando *Bytecode*.

### рҹҢҹ 3.3. Protocolo Gossip P2P
Para tener un cluster *"master-less"* (sin un lГӯder ni servidor centralizado).
- **JustificaciГіn:** Un servidor central o servicio estilo ZooKeeper aГұade complejidad y un punto Гәnico de fallo. *Gossip* emula el comportamiento de un virus o "chisme": cada nodo le cuenta a otro a quiГ©n conoce, propagando la informaciГіn de salud y topologГӯa gradualmente por la red.
- **Resultado:** Alta tolerancia a la particiГіn y fallos en hardware comercial estГЎndar. O(NВІ) de coste pasivo pero inmensa robustez.

### рҹҢҹ 3.4. Apache Kafka
El brГіker de mensajerГӯa distribuido.
- **JustificaciГіn:** Si los agentes de Go enviasen los datos en vivo directo a los nodos, la caГӯda de estos harГӯa perder mГ©tricas, y un aluviГіn de telemetrГӯa harГӯa colapsar la capa de red con denegaciГіn de servicio (Backpressure problems). Kafka introduce **desacoplamiento** y actГәa de "amortiguador" (*buffer*) y log distribuido.
- **Resultado:** Si el cluster RMI de Java se apaga o sufre, Kafka retiene ordenadamente los mensajes hasta que vuelva, permitiendo ademГЎs el re-procesamiento si fuera necesario.

### рҹҢҹ 3.5. Golang (Agentes de ExtracciГіn)
El `AgenteGo` se encarga de extraer la mГ©trica e iniciar el ciclo vital de los datos.
- **JustificaciГіn:** Go se compila como un binario estГЎtico, sin requerir una JVM de 200MB en las mГЎquinas de donde obtiene los datos. Es altamente concurrente y consume ~15MB-30MB de memoria en ejecuciГіn. Ideal para *sidecars* y sistemas embebidos de monitorizaciГіn.

### рҹҢҹ 3.6. Apache Avro + Schema Registry
Para la codificaciГіn del mensaje publicado en Kafka.
- **JustificaciГіn:** Frente a JSON que necesita descifrar strings, Avro comprime los datos de forma binaria apoyado en un *schema* fijo, reduciendo drГЎsticamente (hasta en un 70%) el tamaГұo de banda ocupada en red y acelerando la de-serializaciГіn.
- **Gobierno del esquema:** un **Schema Registry** (Confluent en local; compatible con Apicurio) centraliza la definiciГіn del esquema (`schemas/telemetry.avsc`). NiFi serializa con Г©l al publicar y el cliente Java deserializa con `KafkaAvroDeserializer`, garantizando compatibilidad y evoluciГіn controlada del contrato de datos.

### рҹҢҹ 3.7. Apache NiFi (Gateway de ingesta con verificaciГіn de licencia)
Pasarela que media entre los agentes Go y Kafka.
- **JustificaciГіn:** desacopla a los agentes del broker (no manejan credenciales ni topologГӯa de Kafka), centraliza la **autenticaciГіn por licencia** contra MySQL con revocaciГіn inmediata (`activa = 0`) y aporta trazabilidad de la ingesta. Solo las licencias activas se publican en `telemetry`; el resto se rechaza con HTTP 401.
- **Resultado:** control de acceso por collector sin tocar el cГіdigo de los agentes, a coste de un salto de red adicional. Documentado en `NIFI_GATEWAY.md`.

### рҹҢҹ 3.8. Apache Cassandra
AlmacГ©n de la serie temporal de telemetrГӯa.
- **JustificaciГіn:** Cassandra ofrece escritura rГЎpida y escalabilidad horizontal lineal para series temporales de alto volumen, ideal para el flujo continuo de mediciones. El keyspace `webhardmon` modela `mediciones` (particionada por `empresa_id` y ordenada por `ts DESC`), junto con `ordenadores` y `empresas`.
- **JustificaciГіn de la doble BD:** MySQL conserva el modelo relacional de la aplicaciГіn (empresa, administrador, usuario, licencia) y la autenticaciГіn de agentes; Cassandra absorbe la carga de escritura de telemetrГӯa sin penalizar la BD relacional.

### рҹҢҹ 3.7. TLS/SSL para Cifrado
Para la comunicaciГіn en el interior del cluster.
- **JustificaciГіn:** RMI en crudo carece de seguridad y transita en texto o bytes predecibles por la red (vulnerable a *man-in-the-middle* o ejecuciГіn de comandos remota maliciosa). Inyectando `-Djavax.net.ssl.trustStore` y fГЎbricas de SSL personalizadas, el cluster RMI pasa a ser encriptado, pudiendo interconectar zonas geogrГЎficas diferentes con seguridad.

## 4. рҹ”Җ Flujo Completo y Ciclo de Vida de los Datos

Para empaquetar cГіmo coopera todo, este es el viaje de 1 milisegundo de tu aplicaciГіn:

1. **[GO]** Un sensor en el Agente de Go detecta que la CPU local estГЎ al 90% y captura el resto de mГ©tricas (RAM, disco, temperatura y **baterГӯa** `bateria_percent`, `null` si el equipo no tiene baterГӯa). Empaqueta esta informaciГіn.
2. **[GO -> NIFI]** Go envГӯa la mГ©trica por HTTP POST al gateway de NiFi, incluyendo las cabeceras de licencia (`X-License-Code`, `X-Portatil`).
3. **[NIFI]** NiFi verifica la licencia contra MySQL (`licencia.activa = 1`). Si es invГЎlida, responde **HTTP 401** y descarta el dato. Si es vГЎlida, serializa a **Avro** (gobernado por Schema Registry) y publica en el topic `telemetry` de Kafka (HTTP 200 al agente).
4. **[BROKER]** Kafka almacena el paquete y se asegura de que exista persistencia y replicaciГіn.
5. **[JAVA CLIENT]** El `rmi-client` ("el consumidor"), mediante un bucle de `poll`, recibe el registro Avro y lo deserializa con `KafkaAvroDeserializer` (resolviendo el esquema vГӯa Schema Registry).
6. **[JAVA CLIENT -> LOAD BALANCER]** El `Client` verifica su cachГ© Gossip. Descubre que hay 3 nodos vivos. El puntero *round-robin* selecciona el `NODO 2` y despacha el cГЎlculo en un Virtual Thread.
7. **[JAVA RMI (TLS)]** El Virtual Thread invoca remotamente el cГЎlculo del `StressScore` (mediante `StressTask`) sobre el `NODO 2`. El flujo viaja por red con encriptaciГіn TLS.
8. **[JAVA NODE]** El `NODO 2` (Motor de CГЎlculo) ejecuta `StressTask.execute()` en un *Virtual Thread* y devuelve el StressScore.
9. **[CASSANDRA]** El cliente persiste la mediciГіn enriquecida (mГ©tricas + StressScore) en `webhardmon.mediciones`.
10. **[ACK]** Solo tras procesar y persistir el lote, el cliente confirma el *offset* con `commitSync` (**ack manual**, `enable.auto.commit=false`). Un mensaje no procesable se aparca en la **dead-letter** `telemetry.DLT` sin bloquear el flujo, garantizando *at-least-once*.


## 5. рҹҡҖ Resiliencia (Casos Extremos)

- **Un Nodo de procesado se quema/cae:** Los demГЎs dejarГЎn de recibir pings. Tras 3-5 iteraciones, el nodo se elimina del Directorio Global P2P. El Cliente al fallar su intento inicial, lanza un *Failover* automГЎtico e intenta el siguiente nodo transparente. NingГәn dato de Kafka se pierde.
- **Go genera 100 veces mГЎs trГЎfico del habitual:** Kafka se encargarГЎ del encolamiento y almacenamiento. El cluster procesarГЎ tan rГЎpido como pueda.
- **Se incorporan mГЎs Nodos:** Simplemente arrancan un nuevo proceso instanciado apontando a la capa de Semillas (*Seeds*). En un par de *pings* el cluster entero conoce los nuevos recursos computacionales disponibles de forma orgГЎnica.
- **El consumidor falla al procesar/persistir un mensaje:** gracias al **ack manual**, el *offset* solo se confirma tras procesar el lote, de modo que un fallo provoca el reprocesamiento (semГЎntica *at-least-once*) y ningГәn mensaje se pierde. Un mensaje irrecuperable (p.ej. corrupto) se desvГӯa a la **dead-letter** `telemetry.DLT` con cabeceras de diagnГіstico, sin bloquear el resto del flujo.
- **Un collector con licencia revocada o falsa intenta inyectar datos:** NiFi lo rechaza en el gateway con **HTTP 401** verificando `licencia.activa` contra MySQL, antes de tocar Kafka. La revocaciГіn (`activa = 0`) surte efecto en el siguiente envГӯo sin reiniciar nada.

## 6. рҹ“Ҳ EvaluaciГіn Cuantitativa del Rendimiento y Escalabilidad

Para validar cientГӯficamente las decisiones de diseГұo adoptadas, se ha implementado un componente de benchmark (`cluster.Benchmark`) en el submГіdulo del Cliente para evaluar tanto la concurrencia a nivel de nodo individual como la escalabilidad horizontal en un entorno distribuido de nodos variables.

### 6.1. Pruebas de Concurrencia de un Nodo
Se ejecutГі un lote estresante de **500 tareas simultГЎneas** simulando el cГЎlculo de la mГ©trica **Stress Score** junto con operaciones bloqueantes de red o almacenamiento (esperas de 15ms) bajo tres estrategias de concurrencia:

1. **Secuencial (Bloqueante)**: 
   - **Tiempo total**: **10.294 ms**
   - **Rendimiento**: **48,6 tareas/seg**
   - **LimitaciГіn**: El hilo principal se bloquea durante la espera de red/disco de cada tarea, forzando un procesamiento puramente secuencial.
2. **Hilos de Plataforma (Pool Fijo de 20)**:
   - **Tiempo total**: **731 ms (Speedup: 14,08x)**
   - **Rendimiento**: **684,0 tareas/seg**
   - **LimitaciГіn**: Mejora sustancial al procesar hasta 20 tareas en paralelo, pero genera cola de espera en el pool al haber mГЎs tareas concurrentes (500) que hilos de CPU asignados. Aumentar el pool a 500 hilos dispararГӯa el consumo de memoria JVM (~1MB por pila de hilo).
3. **Hilos Virtuales (Project Loom - Java 21)**:
   - **Tiempo total**: **150 ms (Speedup: 68,63x)**
   - **Rendimiento**: **3.333,3 tareas/seg**
   - **Ventaja**: Los hilos virtuales se suspenden y reanudan de forma transparente sin bloquear el hilo fГӯsico del sistema operativo cuando esperan I/O. Esto maximiza la eficiencia de CPU y permite que miles de tareas concurrentes se resuelvan casi instantГЎneamente con un Гәnico hilo portador de OS activo.

#### рҹ§Ә CГіmo y quГ© se ha probado en Concurrencia (Detalle de la prueba):
- **Clase de ejecuciГіn**: [`Benchmark.java`](file:///c:/Users/aimar/Downloads/files/client/src/main/java/cluster/Benchmark.java) en el submГіdulo `client` (mГ©todo `runLocalBenchmark()`).
- **LГіgica interna de simulaciГіn (Modelo a Trozos / Piecewise)**:
  - Cada una de las 500 tareas simula el procesamiento de una ventana temporal de **1.000 muestras de telemetrГӯa** generadas con ruido gaussiano (fluctuaciones realistas de CPU, RAM, Disco y Temperatura).
  - Para cada muestra calcula el **Stress Score** aplicando el **Modelo a Trozos**: media ponderada `(0.35В·CPU + 0.30В·Temp + 0.20В·RAM + 0.15В·Disco)` con **Hard Override** cuando `max(CPU, Temp) вүҘ 90%`, siguiendo la metodologГӯa USE de Brendan Gregg.
  - Aplica suavizado **EWMA** (Exponential Weighted Moving Average, Оұ=0.3) sobre la serie temporal de scores.
  - Calcula estadГӯsticas (media, desviaciГіn tГӯpica) y percentiles **P95/P99** mediante ordenaciГіn `Arrays.sort()` (complejidad O(n log n)).
  - Finalmente ejecuta `Thread.sleep(15)` simulando la persistencia del resultado en BD (operaciГіn de E/S bloqueante de 15ms).
- **Proceso de ejecuciГіn**:
  1. Compila el proyecto completo desde el directorio raГӯz:
     ```bash
     mvn clean package -DskipTests
     ```
  2. Ejecuta el benchmark de concurrencia local (sin argumentos):
     ```bash
     java -cp client/target/client-1.0-SNAPSHOT.jar cluster.Benchmark
     ```
  3. El programa ejecuta secuencialmente las 500 tareas (acumulando el tiempo de bloqueo en un Гәnico hilo), luego las distribuye en un `ThreadPoolExecutor` fijo de 20 hilos de plataforma tradicionales, y finalmente usa `Executors.newVirtualThreadPerTaskExecutor()` para lanzarlas concurrentemente mediante hilos virtuales. Al finalizar, vuelca en la consola una tabla comparativa con los tiempos y tasas de rendimiento obtenidos.

### 6.2. Escalabilidad del ClГәster con Nodos Variables
Se evaluГі el comportamiento global del sistema distribuyendo **150 tareas de alta computaciГіn en CPU y bloqueo I/O** por Round-Robin hacia un nГәmero incremental de nodos activos:

- **1 Nodo Activo**: **138,89 tareas/seg** (Tiempo: 1.080 ms)
- **2 Nodos Activos**: **261,78 tareas/seg** (Tiempo: 573 ms)
- **3 Nodos Activos**: **537,63 tareas/seg** (Tiempo: 279 ms)

#### AnГЎlisis de Escalabilidad:
1. **Desacoplamiento y Carga Lineal**: El balanceador del Cliente reparte la carga de trabajo de forma dinГЎmica usando Round-Robin. 
2. **Escalabilidad Horizontal Real**: Ejecutar mГәltiples nodos de cГЎlculo en la misma mГЎquina fГӯsica para este benchmark local comparte los cores reales de CPU y el ancho de banda del bucle local de red (localhost), limitando el factor de aceleraciГіn mГЎximo. Sin embargo, en un entorno de red distribuido real con mГЎquinas fГӯsicas dedicadas por nodo, la adiciГіn de nodos incrementa linealmente la capacidad del clГәster de forma proporcional al nГәmero de CPUs reales.
3. **DiseГұo Modulado sin Coordinador Central**: La arquitectura Gossip permite expandir la potencia del clГәster de forma caliente (on-the-fly) sin cuellos de botella de sincronizaciГіn centralizada.

#### рҹ§Ә CГіmo y quГ© se ha probado en Escalabilidad (Detalle de la prueba):
- **Clases de ejecuciГіn**: [`Benchmark.java`](file:///c:/Users/aimar/Downloads/files/client/src/main/java/cluster/Benchmark.java) (mГ©todo `runClusterBenchmark()`) enviando instancias de la clase serializable [`BenchmarkTask.java`](file:///c:/Users/aimar/Downloads/files/common/src/main/java/cluster/BenchmarkTask.java) al clГәster de servidores [`ClusterNode.java`](file:///c:/Users/aimar/Downloads/files/server/src/main/java/cluster/ClusterNode.java).
- **LГіgica interna de simulaciГіn (`BenchmarkTask`) вҖ” Pipeline completo**:
  - Cada una de las 150 tareas distribuidas ejecuta el pipeline de anГЎlisis de telemetrГӯa sobre una ventana de **5.000 muestras** generadas con distribuciГіn gaussiana sobre las mГ©tricas base.
  - Calcula el **Stress Score** para cada muestra usando el **Modelo a Trozos** (media ponderada + Hard Override al 90%), aplica suavizado **EWMA** (Оұ=0.3), obtiene estadГӯsticas descriptivas y percentiles **P95/P99** mediante ordenaciГіn.
  - Realiza **detecciГіn de anomalГӯas por Z-Score** (umbral > 2Пғ) y calcula un score final compuesto ponderando los estadГӯsticos con un factor multiplicativo por anomalГӯas detectadas.
  - Luego, ejecuta un bloqueo `Thread.sleep(40)` (40ms) que emula la latencia de almacenamiento distribuido e I/O de red.
- **Proceso de ejecuciГіn**:
  1. AsegГәrate de tener Kafka iniciado (`docker compose up -d kafka`).
  2. Levanta entre 1 y 3 nodos de cГЎlculo en terminales independientes:
     - **Terminal del Nodo 1**:

## 7. рҹ“Ұ Despliegue y OperaciГіn

El sistema se empaqueta en contenedores y se despliega por **capas de Docker Compose**, lo que permite levantar solo el nГәcleo de procesamiento o el stack completo con ingesta.

| Imagen | Rol | RГ©plicas |
|---|---|---|
| `rmi-server` | Nodo del clГәster RMI (calcula StressScore). ClГәster P2P con gossip. | 3 (1 por VM) |
| `rmi-client` | Puente: consume Kafka (Avro/SR) вҶ’ StressScore por RMI вҶ’ escribe Cassandra. | 1 |

Se construyen desde `server/Dockerfile` y `client/Dockerfile` y se publican en **Harbor** (local) o **Artifact Registry** (GCP). Detalle del contrato de integraciГіn en `CONTAINER_CONTRACT.md`.

### 7.2. Compose por capas
- **`docker-compose.yml` (core):** Kafka + Schema Registry + Cassandra (con `cassandra-init` que carga `db/schema-cassandra.cql`) + 3 nodos `rmi-server` + `rmi-client`. Es un entorno end-to-end de procesamiento sin necesidad de la infra del equipo.
- **`docker-compose.ingest.yml` (overlay de ingesta):** aГұade **NiFi** + **MySQL** (inicializado con `db/init.sql`). Se fusiona con el core compartiendo red:
  ```bash
  docker compose -f docker-compose.yml -f docker-compose.ingest.yml up -d
  ```
- **`docker-compose.gcp.yml` (producciГіn):** core de producciГіn en GCP; admite el mismo overlay de ingesta con `-f`.

### 7.3. Nube y orquestaciГіn
- **GCP turnkey:** `deploy-gcp.sh` automatiza el despliegue en Google Cloud (ver `DEPLOY_GCP.md`).
- **Kubernetes:** `k8s-deployment.yaml` describe el despliegue en clГәster K8s.
- **Infraestructura del equipo:** repositorio OpenTofu **`webhardmon-infra`** que provisiona **3 nubes** (Proxmox local + GCP-A + GCP-B) interconectadas por una malla **WireGuard**, con **Cloudflare Tunnel** para exposiciГіn y registries **Harbor** + **Artifact Registry**.

## рҹҺ“ Vocabulario Clave

| TГ©rmino | Significado | Ejemplo |
|---------|-------------|---------|
| **Bootstrap** | Arranque inicial (cliente obtiene lista de miembros) | Client llama gossip() a una semilla |
| **Gossip** | Protocolo de chismes (nodos intercambian membresГӯa) | NODE-1 le dice a NODE-2: "conozco a NODE-3" |
| **Failover** | Cambio automГЎtico a alternativa | Cliente intenta NODE-2, falla, intenta NODE-3 |
| **Tombstone** | Marca de "nodo muerto" (temporal) | NODE-1 evicta NODE-2, lo marca muerto por 30s |
| **Anti-entropy** | Protocolo que reduce el desorden | Gossip hace que todos aprendan lo mismo |
| **Round-robin** | Alternancia circular | Llamada 1вҶ’NODE-1, 2вҶ’NODE-2, 3вҶ’NODE-3, 4вҶ’NODE-1 |
| **SPOF** | Single Point of Failure (punto Гәnico de fallo) | No hay SPOF aquГӯ (sin servidor central) |
| **RMI** | Remote Method Invocation (llamadas remotas Java) | `stub.processTelemetry(payload)` es una llamada remota |
| **Registry** | Directorio de servicios RMI | Cada nodo crea su propio registry |
| **Kafka** | Bus de mensajerГӯa (topic "telemetry", 9092/9094) | Reemplaza al antiguo RabbitMQ |
| **ACK manual** | ConfirmaciГіn explГӯcita del consumidor | El client confirma sГіlo tras procesar el mensaje |
| **Dead-letter (DLT)** | Cola de mensajes fallidos | Lo no procesable va a "telemetry.DLT" |
| **Schema Registry** | Registro de esquemas Avro (8085) | NiFi/Kafka validan y (de)serializan con Avro |
| **Cassandra** | BD NoSQL de telemetrГӯa | Keyspace `webhardmon`, tabla `mediciones` |
| **NiFi** | Ingesta: valida licencia y publica a Kafka | Recibe del Agente Go en 8081 (UI en 8443) |

## рҹ“Ҳ Escalabilidad

### ВҝQuГ© pasa si agregamos 100 nodos?

| Aspecto | Impacto |
|---------|---------|
| Gossip load | Cada nodo itera 100 peers cada 3s (~33/s) вҶ’ Escalable |
| Cliente discovery | Mismo (bootstrap desde 1 seed) |
| Memory (per node) | members = Map 100 * Endpoint вҶ’ ~10KB вҶ’ OK |
| Network (gossip) | 100 nodos * 100 gossips/3s вүҲ 3300 RMI calls/s вҶ’ Posible saturar red |
| Failover latency | Sin cambios (round-robin sigue igual) |

**ConclusiГіn:** Escalable hasta ~50-100 nodos con gossip cada 3s. Para mГЎs, necesitas gossip probabГӯlГӯstico (no todos con todos).

# рҹ”җ Ejecutar Cluster RMI con TLS/SSL

Para asegurar la red RMI interna frente a ataques man-in-the-middle o inyecciГіn de tareas no autorizadas, el clГәster puede configurarse para cifrar todo su trГЎfico por TLS/SSL de forma nativa.

## рҹ“Ӣ ConfiguraciГіn Paso a Paso

### Paso 1: Generar Certificados (Keystore)

Ejecuta el script incluido en el proyecto para generar el keystore auto-firmado:
* **En Windows**: `generate-certs.bat`
* **En Linux/Mac**: `./generate-certs.sh`

Este comando crea el almacГ©n de claves `server.keystore` en el directorio de trabajo con la clave privada y el certificado pГәblico.

---

### Paso 2: Ejecutar Nodos CON TLS

Inyecta las propiedades de red TLS de la JVM al arrancar cada `ClusterNode`:

```bash
java -Djavax.net.ssl.keyStore=server.keystore \
     -Djavax.net.ssl.keyStorePassword=changeit \
     -cp server/target/server-1.0-SNAPSHOT.jar \
     cluster.ClusterNode node-1 localhost 6100 localhost:6100 localhost:6101 localhost:6102
```

---

### Paso 3: Ejecutar Cliente CON TLS

El cliente requiere confiar en el certificado del clГәster (Truststore). PГЎsale los parГЎmetros correspondientes:

```bash
java -Djavax.net.ssl.trustStore=server.keystore \
     -Djavax.net.ssl.trustStorePassword=changeit \
     -cp client/target/client-1.0-SNAPSHOT.jar \
     cluster.Client localhost:6100 localhost:6101 localhost:6102
```

---

## рҹ”‘ Propiedades JVM Explicadas

| Propiedad JVM | PropГіsito |
|---------------|-----------|
| `-Djavax.net.ssl.keyStore` | Archivo con la clave privada y certificado del servidor RMI. |
| `-Djavax.net.ssl.keyStorePassword` | ContraseГұa del almacГ©n de claves (por defecto: `changeit`). |
| `-Djavax.net.ssl.trustStore` | Archivo que contiene los certificados de los servidores en los que el cliente confГӯa. |
| `-Djavax.net.ssl.trustStorePassword` | ContraseГұa del almacГ©n de confianza. |
| `-Djavax.net.debug=ssl:handshake` | (Opcional) Habilita el modo debug para visualizar la traza completa del handshake TLS en consola. |

## рҹ“Ҡ ComparaciГіn: Con TLS vs Sin TLS

| Aspecto | Sin TLS | Con TLS |
|---------|---------|---------|
| **Seguridad** | рҹ”ҙ TrГЎfico en texto claro (Vulnerable) | рҹҹў Cifrado asimГ©trico (Seguro) |
| **Rendimiento** | рҹҹў Latencia base (~1-2ms por llamada RMI) | рҹҹЎ ~5-10% de sobrecarga por Handshake TLS |
| **Complejidad** | рҹҹў Ninguna | рҹҹЎ Requiere gestiГіn e instalaciГіn de Keystores |
| **ProducciГіn** | вқҢ Desaconsejado | вң… Altamente recomendado |

## 9пёҸвғЈ MГ©tricas de Rendimiento

### Latency promedio (localhost):
- **RMI lookup**: ~0.5ms
- **processTelemetry() call**: ~1-2ms
- **Gossip round**: ~5-10ms

### DetecciГіn de fallos:
- **Timeout RMI**: 3s (default Java RMI)
- **Fallos consecutivos**: 3 = ~9 segundos
- **Tiempo total eviction**: ~10 segundos

### RecuperaciГіn:
- **Rejoin (restart)**: InstantГЎneo (direct contact clears tombstone)
- **Bootstrap**: ~30 segundos en peor caso (si todos los seeds estГЎn down)

## 1пёҸвғЈ1пёҸвғЈ PseudocГіdigo: Gossip Loop Principal

```java
// En cada ClusterNode, ejecuta cada 3 segundos:

ScheduledExecutorService scheduler = Executors.newScheduledThreadPool(1);
scheduler.scheduleAtFixedRate(() -> {

    List<String> addrs = new ArrayList<>(members.keySet());

    for (String addr : addrs) {
        try {
            Endpoint peer = members.get(addr);
            Registry reg = LocateRegistry.getRegistry(
                peer.host, peer.port
            );
            ComputeService stub =
                (ComputeService) reg.lookup("ComputeNode");

            Set<Endpoint> response = stub.gossip(
                self,  // quiГ©n soy yo
                new HashSet<>(members.values())  // mi vista
            );

            // Гүxito: procesar respuesta
            failures.put(addr, 0);  // reset failures
            for (Endpoint e : response) {
                absorb(e);
            }

        } catch (Exception e) {
            // Fallo: contar
            int count = failures.getOrDefault(addr, 0) + 1;
            failures.put(addr, count);

            if (count >= MAX_FAILURES) {
                evict(addr);  // Fuera del cluster
                tombstones.put(addr, System.currentTimeMillis());
            }
        }
    }

    // Si quedГі vacГӯo, re-agregar seeds
    if (members.isEmpty()) {
        for (Endpoint seed : seeds) {
            absorb(seed);
        }
    }

}, 0, 3, TimeUnit.SECONDS);
```

# рҹҡҖ GuГӯa de Despliegue en Google Cloud Platform (GCP)

Esta guГӯa detalla cГіmo desplegar el clГәster RMI de servidores (`ClusterNode`), el cliente consumidor de Kafka (`Client`) y el broker de Kafka en GCP. Todo el despliegue de la **OpciГіn A estГЎ automatizado** con `deploy-gcp.sh`; la OpciГіn B (GKE) usa el manifiesto `k8s-deployment.yaml`.

---

## рҹҸ—пёҸ Resumen de Arquitectura en la Nube

```
[AgenteGo en mГЎquinas externas]  --Avro/Kafka 9094-->  [ Kafka ]
                                                           в”Ӯ (topic "telemetry", listener INTERNAL 9092)
                                                           в–ј
                                                       [ Client ]  --RMI round-robin + failover-->  [ node-1 | node-2 | node-3 ]
```

- **AgenteGo NO se despliega en cloud**: corre en cada mГЎquina monitorizada y solo necesita alcanzar el puerto **9094** de Kafka.
- **Kafka + Client + 3 nodos** sГӯ van a cloud, en la misma red para que RMI resuelva los hostnames `node-1/2/3`.

Dos enfoques:

1. **OpciГіn A (recomendada): Google Compute Engine (GCE)** вҖ” una VM con Docker Compose.
   - **Por quГ©**: RMI embute el hostname en el stub y exporta el objeto remoto en un **puerto anГіnimo** (`super(0)` en `ClusterNode`). Dentro de la red bridge de Compose esto "just works" sin abrir puertos extra. Ideal para demo de tolerancia a fallos y pre-producciГіn.
2. **OpciГіn B: Google Kubernetes Engine (GKE)** вҖ” `StatefulSet` con DNS headless estable (`rmi-node-0.rmi-service`). Solo merece la pena si necesitas escalado elГЎstico.

> вҡ пёҸ **Kafka es un Гәnico broker (SPOF).** El clГәster RMI es altamente disponible (puedes matar nodos y sigue funcionando), pero Kafka no. Para producciГіn real usa Confluent Cloud o un clГәster Kafka multi-broker. Para demo/pre-producciГіn, un solo broker es suficiente.

## вң… OpciГіn A вҖ” Despliegue automatizado (turnkey)

### Requisitos previos (en tu mГЎquina local)
- `gcloud` CLI autenticado: `gcloud auth login`
- Docker en marcha (para construir y subir las imГЎgenes)

El script ejecuta, de forma idempotente:

Si prefieres no usar el script, estos son los comandos equivalentes.

### 1. Artifact Registry e imГЎgenes

## вҳёпёҸ OpciГіn B: Despliegue en Google Kubernetes Engine (GKE)

El manifiesto completo y funcional estГЎ en **`k8s-deployment.yaml`** e incluye Kafka, el `StatefulSet` de los 3 nodos (con DNS headless) y el `Deployment` del Client.

```bash
# 1. Sustituye los placeholders por tus valores
sed -i 's/\[PROJECT_ID\]/mi-proyecto/; s/\[REGION\]/europe-west1/' k8s-deployment.yaml

# 2. Autentica kubectl contra tu clГәster GKE y aplica

```

Kubernetes arranca `rmi-node-0/1/2` de forma ordenada; cada uno se comunica con los demГЎs vГӯa el DNS headless `rmi-node-X.rmi-service`. El Client consume de `kafka:9092` y reparte la telemetrГӯa por RMI.

> Para que los AgenteGo externos publiquen en este Kafka necesitarГӯas exponerlo (Service `LoadBalancer` + listener EXTERNAL con la IP del LB). El manifiesto base solo expone Kafka internamente; aГұade ese listener si tus agentes estГЎn fuera del clГәster.
